# Tilt + build tooling: where to push dev images.
# In-cluster registry LoadBalancer on Multipass L2 (see config/cluster.env).
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-registry-hosting
  namespace: kube-public
data:
  localRegistryHosting.v1: |
    host: "10.177.76.220:5000"
    hostFromClusterNetwork: "registry.registry.svc.cluster.local:5000"
    hostFromContainerRuntime: "registry.registry.svc.cluster.local:5000"
    help: "shared-k8s-cluster in-cluster registry (MetalLB). Alias localhost:5001 via k3s registries.yaml."
