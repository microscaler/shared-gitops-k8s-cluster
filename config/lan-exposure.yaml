# LAN L4 → Envoy Gateway VIP (TCP proxy). No per-service MetalLB hops.
#
# HTTP(S) *.dev.microscaler.local is owned by haproxy (config/lan-http-vhosts.yaml):
#   Tilt → localhost; everything else → Envoy :80.
#
# Apply on ms02: just lan-proxy-up

ms02_lan_ip: "192.168.1.189"

proxies:
  # All targets are ENVOY_GATEWAY_LB_IP — listener port == lan_port (see Gateway TCP listeners).
  - name: k8s-api
    lan_port: 6443
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 6443
    protocol: tcp
  - name: postgres
    lan_port: 5433
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 5433
    protocol: tcp
  - name: redis
    lan_port: 6390
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 6390
    protocol: tcp
  - name: minio-api
    lan_port: 9000
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 9000
    protocol: tcp
  - name: mailpit-smtp
    lan_port: 1025
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 1025
    protocol: tcp
  - name: faktory
    lan_port: 7419
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 7419
    protocol: tcp
  - name: otel-grpc
    lan_port: 4317
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 4317
    protocol: tcp
  - name: otel-http
    lan_port: 4318
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 4318
    protocol: tcp
  - name: registry
    lan_port: 5001
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 5001
    protocol: tcp
  - name: squid
    lan_port: 3128
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 3128
    protocol: tcp
  - name: fluvio-sc
    lan_port: 9003
    lb_ip_env: ENVOY_GATEWAY_LB_IP
    target_port: 9003
    protocol: tcp

  # UDP (FreeRADIUS): use Envoy VIP directly from a host with mpqemubr0 route
  # (10.177.76.234:1812/1813). haproxy UDP path not used.
