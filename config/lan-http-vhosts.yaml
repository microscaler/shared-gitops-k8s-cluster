# RETIRED — HTTP host routing for *.dev.microscaler.local is Envoy Gateway + HTTPRoute
# (gitops/root/components/envoy-gateway/). Lan-proxy only TCP-forwards :80/:443 to
# ENVOY_GATEWAY_LB_IP (see config/lan-exposure.yaml).
#
# Keep this file so tools/configure_lan_proxy.py and sync_haproxy_tls.py stay stable
# with an empty vhost list (no host-based haproxy frontends).

http_port: 80
https_port: 443

tls:
  namespace: cert-manager
  secret_name: dev-microscaler-local-tls
  sync_dir: /etc/microscaler/haproxy/certs
  pem_file: dev.microscaler.local.pem

vhosts: []
