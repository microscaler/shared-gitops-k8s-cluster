# Platform stack catalog — GitOpsSets template Flux Kustomizations from these rows.
# Per-cluster enablement: gitops/clusters/<id>/inventory/stacks.yaml (subset + overrides).
#
# path: repo-relative path for Flux Kustomization.spec.path
# depends_on: other stack names (same catalog) for Flux dependsOn

stacks:
  - name: namespaces
    path: ./gitops/root/components/namespaces
    description: Platform and app namespaces
    depends_on: []

  - name: cluster
    path: ./gitops/root/components/cluster
    description: In-cluster OCI registry + housekeeping (MetalLB Services)
    depends_on: [namespaces]

  - name: postgres-ha
    path: ./gitops/root/components/postgres-ha
    description: Bitnami postgresql-ha (repmgr + Pgpool) with bitnamilegacy images
    depends_on: [namespaces]

  - name: minio
    path: ./gitops/root/components/minio
    description: MinIO object store (Retain hostPath); target for postgres dumps
    depends_on: [namespaces]

  - name: postgres-backup
    path: ./gitops/root/components/postgres-backup
    description: pg_dumpall CronJob → MinIO bucket postgres-backups
    depends_on: [postgres-ha, minio]

  - name: platform-data
    path: ./gitops/root/components/platform-data
    description: Redis, messaging, scheduling, gcp emulators (postgres via postgres-ha; minio via minio stack)
    depends_on: [postgres-ha, minio]

  - name: observability
    path: ./gitops/root/components/observability
    description: Prometheus, Loki, Grafana, Jaeger, OTel, Promtail
    depends_on: [namespaces]

  - name: cylon-infra
    path: ./gitops/root/components/cylon-infra
    description: routellm, squid, freeradius, resurrection-hub
    depends_on: [namespaces]

  - name: ai
    path: ./gitops/root/components/ai
    description: Shared AI helpers
    depends_on: [namespaces]

  - name: platform-dev-tls
    path: ./gitops/root/components/platform-dev-tls
    description: cert-manager bootstrapped dev CA + wildcard (wrapper → platform/dev-tls)
    depends_on: [namespaces]

  - name: platform-openbao
    path: ./gitops/root/components/platform-openbao
    description: OpenBao secrets backend (wrapper → platform/openbao)
    depends_on: [namespaces]
