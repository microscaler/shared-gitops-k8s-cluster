# MetalLB LoadBalancer inventory (dev / Multipass bridge 10.177.76.0/24).
# Host LAN proxy (shared-k8s-cluster) should consume this file — do not fork a second table.
# Check drift: just check-metallb-inventory
# Future clusters override via clusters/<id>/inventory/metallb-services.yaml.
#
# status: unused → reserved IP, no component annotation expected yet

services:
