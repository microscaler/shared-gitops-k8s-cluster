  # Envoy Gateway data-plane Service (name is controller-generated; inventory tracks VIP).
  - name: envoy-microscaler-dev
    namespace: envoy-gateway-system
    lb_ip: 10.177.76.234
    ports:
      - name: http
        port: 80
        protocol: TCP
      - name: https
        port: 443
        protocol: TCP
    lan_port: 80
    lan_ports:
      - {name: http, lan_port: 80, target_port: 80}
      - {name: https, lan_port: 443, target_port: 443}

  - name: mailpit
