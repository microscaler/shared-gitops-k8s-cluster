# MetalLB LoadBalancer inventory (dev / Multipass bridge 10.177.76.0/24).
# lan_port = still forwarded by haproxy → Envoy VIP (config/lan-exposure.yaml).
# Browser UIs use Envoy HTTPRoute (*.dev). Keep aligned with config/loadbalancer-ips.env.
# Check drift: just check-metallb-inventory

services:
  - name: registry
    namespace: registry
    lb_ip: 10.177.76.220
    ports:
      - name: http
        port: 5000
        protocol: TCP
    lan_port: 5001

  - name: squid-proxy
    namespace: cylon
    lb_ip: 10.177.76.222
    ports:
      - name: http
        port: 3128
        protocol: TCP
    lan_port: 3128

  - name: freeradius
    namespace: cylon
    lb_ip: 10.177.76.223
    ports:
      - name: auth
        port: 1812
        protocol: UDP
      - name: acct
        port: 1813
        protocol: UDP
    # UDP: Envoy VIP on mpqemubr0 (not haproxy)

  - name: postgres
    namespace: data
    lb_ip: 10.177.76.224
    ports:
      - name: postgres
        port: 5432
        protocol: TCP
    lan_port: 5433

  - name: redis
    namespace: data
    lb_ip: 10.177.76.225
    ports:
      - name: redis
        port: 6379
        protocol: TCP
    lan_port: 6390

  - name: minio
    namespace: data
    lb_ip: 10.177.76.226
    ports:
      - name: api
        port: 9000
        protocol: TCP
      - name: console
        port: 9001
        protocol: TCP
    lan_port: 9000  # S3 API via Envoy TCP; console UI via minio.dev

  - name: fluvio-sc-public
    namespace: pipeline
    lb_ip: 10.177.76.228
    ports:
      - name: public
        port: 9003
        protocol: TCP
    lan_port: 9003

  - name: fluvio-spu-default-0
    namespace: pipeline
    lb_ip: 10.177.76.229
    ports:
      - name: public
        port: 9005
        protocol: TCP

  - name: fluvio-spu-default-1
    namespace: pipeline
    lb_ip: 10.177.76.230
    ports:
      - name: public
        port: 9005
        protocol: TCP

  - name: otel-collector
    namespace: observability
    lb_ip: 10.177.76.231
    ports:
      - name: grpc
        port: 4317
        protocol: TCP
      - name: http
        port: 4318
        protocol: TCP
    lan_port: 4317

  - name: faktory-server
    namespace: scheduling
    lb_ip: 10.177.76.233
    ports:
      - name: ui
        port: 7420
        protocol: TCP
      - name: worker
        port: 7419
        protocol: TCP
    lan_port: 7419  # worker via Envoy TCP; UI via faktory.dev

  # Envoy Gateway VIP — haproxy L4 + guest bridge clients; *.dev HTTP via haproxy → :80.
  - name: envoy-microscaler-dev
    namespace: envoy-gateway-system
    lb_ip: 10.177.76.234
    ports:
      - name: http
        port: 80
        protocol: TCP
      - name: https
        port: 443
        protocol: TCP

  - name: mailpit
    namespace: data
    lb_ip: 10.177.76.235
    ports:
      - name: smtp
        port: 1025
        protocol: TCP
      - name: ui
        port: 8025
        protocol: TCP
    lan_port: 1025  # SMTP via Envoy TCP; UI via mailpit.dev
