# MetalLB LoadBalancer inventory (dev / Multipass bridge 10.177.76.0/24).
# Keep aligned with config/loadbalancer-ips.env + config/lan-exposure.yaml.
# Check drift: just check-metallb-inventory

services:
  - name: registry
    namespace: registry
    lb_ip: 10.177.76.220
    ports:
      - name: http
        port: 5000
        protocol: TCP
    lan_port: 5001

  - name: routellm
    namespace: cylon
    lb_ip: 10.177.76.221
