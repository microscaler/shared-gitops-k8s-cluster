# Product repositories own their deployment profiles. Flux source and
# reconciliation objects are generated from this inventory.
environment: dev

sources:
  - name: rerp
    url: ssh://git@github.com/microscaler/rerp.git
    branch: main
    secret_ref: gitops-auth
  - name: sesame-idam
    # GitHub repo and local checkout path: sesame-idam (was historically seasame-idam).
    url: ssh://git@github.com/microscaler/sesame-idam.git
    branch: main
    secret_ref: gitops-auth
  - name: hauliage
    # GitHub repo is haulage; local checkout / product name remains hauliage.
    url: ssh://git@github.com/microscaler/haulage.git
    branch: main
    secret_ref: gitops-auth

components:
  # --- RERP Accounting ---
  - name: rerp-accounting
    source: rerp
    product: rerp
    suite: accounting
    path: ./deployment-configuration/profiles/dev/rerp/accounting
    depends_on: stack-namespaces
    wait: true
    force: true
  - name: rerp-accounting-services
    source: rerp
    product: rerp
    suite: accounting
    path: ./deployment-configuration/profiles/dev/rerp/accounting/services
    depends_on: rerp-accounting
    wait: true
    force: false
  - name: rerp-accounting-catalog
    source: rerp
    product: rerp
    suite: accounting
    path: ./deployment-configuration/profiles/dev/rerp/accounting/catalog
    depends_on: rerp-accounting
    wait: false
    force: false

  # --- Sesame-IDAM ---
  - name: sesame-idam-idam
    source: sesame-idam
    product: sesame-idam
    suite: idam
    path: ./deployment-configuration/profiles/dev/sesame-idam/idam
    depends_on: stack-namespaces
    wait: true
    force: true
  - name: sesame-idam-idam-services
    source: sesame-idam
    product: sesame-idam
    suite: idam
    path: ./deployment-configuration/profiles/dev/sesame-idam/idam/services
    depends_on: sesame-idam-idam
    wait: true
    force: false

  # --- Hauliage ---
  - name: hauliage-core
    source: hauliage
    product: hauliage
    suite: core
    path: ./deployment-configuration/profiles/dev/hauliage/core
    depends_on: stack-namespaces
    wait: true
    force: true
  - name: hauliage-core-services
    source: hauliage
    product: hauliage
    suite: core
    path: ./deployment-configuration/profiles/dev/hauliage/core/services
    depends_on: hauliage-core
    wait: true
    force: false

# Image discovery is cluster integration; update markers stay beside Helm
