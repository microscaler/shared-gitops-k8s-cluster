apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gitopssets-controller
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
spec:
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  path: ./gitops/root/controllers/gitopssets
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: shared-gitops
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: gitopssets-controller
      namespace: flux-system
