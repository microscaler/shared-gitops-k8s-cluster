# Flux Kustomizations for deployment-configuration/profiles/dev/<component>
# (application.properties → ConfigMap, application.secrets.env / *.secret.yaml → Secret).
apiVersion: sets.gitops.pro/v1alpha1
kind: GitOpsSet
metadata:
  name: profile-config
  namespace: flux-system
  annotations:
    sets.gitops.pro/delimiters: "${{,}}"
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
spec:
  serviceAccountName: gitopssets-platform
  generators:
    - gitRepository:
        repositoryRef: shared-gitops
        directories:
          - path: deployment-configuration/profiles/dev/*
  templates:
    - content:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: "profile-config-${{ .Element.Base }}"
          namespace: flux-system
          labels:
            gitops.microscaler.io/profile-config: "${{ .Element.Base }}"
            app.kubernetes.io/part-of: shared-gitops-k8s-cluster
        spec:
          interval: 5m
          retryInterval: 1m
          timeout: 5m
          path: "./deployment-configuration/profiles/dev/${{ .Element.Base }}"
          prune: true
          wait: true
          decryption:
            provider: sops
            secretRef:
              name: sops-age
          sourceRef:
            kind: GitRepository
            name: shared-gitops
            namespace: flux-system
