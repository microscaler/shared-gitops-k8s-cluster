apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitopssets-platform
  namespace: flux-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitopssets-platform
rules:
  # Flux CRs generated by GitOpsSets
  - apiGroups: [kustomize.toolkit.fluxcd.io]
    resources: [kustomizations]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories, ocirepositories, helmrepositories]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [helm.toolkit.fluxcd.io]
    resources: [helmreleases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Image automation CRs generated by product-components GitOpsSet
  - apiGroups: [image.toolkit.fluxcd.io]
    resources: [imagerepositories, imagepolicies, imageupdateautomations]
    verbs: [get, list, watch, create, update, patch, delete]
  # Namespaces / ConfigMaps for inventory-driven resources
  - apiGroups: [""]
    resources: [namespaces, configmaps, secrets, services]
    verbs: [get, list, watch, create, update, patch, delete]
  # Own status / events
  - apiGroups: [sets.gitops.pro]
    resources: [gitopssets, gitopssets/status]
    verbs: [get, list, watch, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitopssets-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitopssets-platform
subjects:
  - kind: ServiceAccount
    name: gitopssets-platform
    namespace: flux-system
