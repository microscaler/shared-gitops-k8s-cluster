apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pact-postgres-data
  namespace: data
  labels:
    app.kubernetes.io/name: pact-postgres
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pact
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs-iscsi
  resources:
    requests:
      storage: 1Gi
