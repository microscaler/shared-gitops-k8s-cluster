# Dev Pact credentials (previously infra-secrets keys). Rotate via OpenBao later.
apiVersion: v1
kind: Secret
metadata:
  name: pact-credentials
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pact
type: Opaque
stringData:
  PACT_POSTGRES_PASSWORD: pact
  PACT_BROKER_BASIC_AUTH_USERNAME: pact
  PACT_BROKER_BASIC_AUTH_PASSWORD: pact
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pact-config
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pact
data:
  PACT_POSTGRES_DB: pact
  PACT_POSTGRES_PGDATA: /var/lib/postgresql/data/pgdata
  PACT_BROKER_ALLOW_PUBLIC_READ: "true"
  PACT_BROKER_LOG_LEVEL: INFO
  PACT_BROKER_PUBLIC_HEARTBEAT: "true"
  PACT_BROKER_WEBHOOK_HTTP_VERIFY: "false"
