apiVersion: apps/v1
kind: Deployment
metadata:
  name: pact-broker
  namespace: data
  labels:
    app: pact-broker
    app.kubernetes.io/name: pact-broker
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pact
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pact-broker
  template:
    metadata:
      labels:
        app: pact-broker
    spec:
      enableServiceLinks: false
      containers:
        - name: pact-broker
          image: pactfoundation/pact-broker:latest
          ports:
            - containerPort: 9292
              name: http
          env:
            - name: PACT_BROKER_DATABASE_ADAPTER
              value: postgres
            - name: PACT_BROKER_DATABASE_HOST
              value: pact-postgres
            - name: PACT_BROKER_DATABASE_PORT
              value: "5432"
            - name: PACT_BROKER_DATABASE_USERNAME
              value: pact
            - name: PACT_BROKER_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pact-credentials
                  key: PACT_POSTGRES_PASSWORD
            - name: PACT_BROKER_DATABASE_NAME
              value: pact
            - name: PACT_BROKER_DATABASE_SSLMODE
              value: disable
            - name: PACT_BROKER_BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: pact-credentials
                  key: PACT_BROKER_BASIC_AUTH_USERNAME
            - name: PACT_BROKER_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pact-credentials
                  key: PACT_BROKER_BASIC_AUTH_PASSWORD
            - name: PACT_BROKER_PUBLIC_HEARTBEAT
              valueFrom:
                configMapKeyRef:
                  name: pact-config
                  key: PACT_BROKER_PUBLIC_HEARTBEAT
            - name: PACT_BROKER_ALLOW_PUBLIC_READ
              valueFrom:
                configMapKeyRef:
                  name: pact-config
                  key: PACT_BROKER_ALLOW_PUBLIC_READ
            - name: PACT_BROKER_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: pact-config
                  key: PACT_BROKER_LOG_LEVEL
            - name: PACT_BROKER_WEBHOOK_HTTP_VERIFY
              valueFrom:
                configMapKeyRef:
                  name: pact-config
                  key: PACT_BROKER_WEBHOOK_HTTP_VERIFY
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
          readinessProbe:
            httpGet:
              path: /
              port: 9292
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 9292
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pact-broker
  namespace: data
  labels:
    app: pact-broker
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pact
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.177.76.232"
spec:
  type: LoadBalancer
  ports:
    - port: 9292
      targetPort: 9292
      protocol: TCP
      name: http
  selector:
    app: pact-broker
