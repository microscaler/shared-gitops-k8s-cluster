apiVersion: apps/v1
kind: Deployment
metadata:
  name: pact-postgres
  namespace: data
  labels:
    app: pact-postgres
    app.kubernetes.io/name: pact-postgres
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pact
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pact-postgres
  template:
    metadata:
      labels:
        app: pact-postgres
    spec:
      initContainers:
        - name: create-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/postgresql/data
              chmod -R 755 /var/lib/postgresql/data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: storage
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: pact
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pact-credentials
                  key: PACT_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pact-config
                  key: PACT_POSTGRES_DB
            - name: PGDATA
              valueFrom:
                configMapKeyRef:
                  name: pact-config
                  key: PACT_POSTGRES_PGDATA
          volumeMounts:
            - name: storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 300m
          readinessProbe:
            exec:
              command: [pg_isready, -U, pact]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: [pg_isready, -U, pact]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: pact-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: pact-postgres
  namespace: data
  labels:
    app: pact-postgres
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pact
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: pact-postgres
