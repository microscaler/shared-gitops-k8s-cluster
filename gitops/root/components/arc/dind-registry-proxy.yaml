# Transparent OCI pull cache for ARC DinD sidecars.
# rpardini/docker-registry-proxy MITMs HTTPS registry traffic (ghcr.io, docker.io, …)
# when DinD sets HTTP(S)_PROXY and trusts the proxy CA.
#
# Revert: remove this file from kustomization.yaml and drop PROXY_* / CA bootstrap
# from runner-scale-set.yaml dind sidecar.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dind-registry-proxy
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: dind-registry-proxy
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: arc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs-iscsi
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dind-registry-proxy
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: dind-registry-proxy
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: arc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dind-registry-proxy
  ports:
    - name: proxy
      port: 3128
      targetPort: 3128
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dind-registry-proxy
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: dind-registry-proxy
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: arc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dind-registry-proxy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dind-registry-proxy
        app.kubernetes.io/part-of: shared-gitops-k8s-cluster
        gitops.microscaler.io/stack: arc
    spec:
      # Stay off gha-runner nodes so the cache does not steal runner packing.
      containers:
        - name: proxy
          # Pin a digest-friendly tag; bump when refreshing the mirror stack.
          image: rpardini/docker-registry-proxy:0.6.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 3128
          env:
            - name: ENABLE_MANIFEST_CACHE
              value: "true"
            - name: CACHE_MAX_SIZE
              value: "18g"
            - name: CACHE_INACTIVE
              value: "60d"
          volumeMounts:
            - name: data
              mountPath: /docker_mirror_cache
              subPath: cache
            - name: data
              mountPath: /ca
              subPath: ca
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /ca.crt
              port: 3128
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ca.crt
              port: 3128
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dind-registry-proxy
