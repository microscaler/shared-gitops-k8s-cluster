# Org AutoscalingRunnerSet (static YAML).
# Chart gha-runner-scale-set 0.14.x renders image/SA fields via `toYaml|nindent`
# which breaks tags containing ':' under Kubernetes SSA — do not Helm-install it.
# Controller remains a HelmRelease; this CR matches chart 0.14.2 shape.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: microscaler-gha-rs-no-permission
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: microscaler
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: arc
    actions.github.com/scale-set-name: microscaler
  finalizers:
    - actions.github.com/cleanup-protection
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: microscaler-gha-rs-manager
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: microscaler
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: arc
    actions.github.com/scale-set-name: microscaler
  finalizers:
    - actions.github.com/cleanup-protection
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [create, delete, get]
  - apiGroups: [""]
    resources: [pods/status]
    verbs: [get]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, delete, get, list, patch, update]
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [create, delete, get, list, patch, update]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [rolebindings, roles]
    verbs: [create, delete, get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: microscaler-gha-rs-manager
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: microscaler
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: arc
    actions.github.com/scale-set-name: microscaler
  finalizers:
    - actions.github.com/cleanup-protection
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: microscaler-gha-rs-manager
subjects:
  - kind: ServiceAccount
    name: arc-controller
    namespace: arc-systems
---
apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  name: microscaler
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: microscaler
    app.kubernetes.io/part-of: gha-rs
    app.kubernetes.io/component: autoscaling-runner-set
    app.kubernetes.io/version: "0.14.2"
    gitops.microscaler.io/stack: arc
    actions.github.com/scale-set-name: microscaler
    actions.github.com/scale-set-namespace: arc-runners

  annotations:
    actions.github.com/cleanup-github-secret-name: github-arc-credentials
    actions.github.com/cleanup-manager-role-binding: microscaler-gha-rs-manager
    actions.github.com/cleanup-manager-role-name: microscaler-gha-rs-manager
    actions.github.com/cleanup-no-permission-service-account-name: microscaler-gha-rs-no-permission
  finalizers:
    - actions.github.com/cleanup-protection
spec:
  githubConfigUrl: https://github.com/microscaler
  githubConfigSecret: github-arc-credentials
  runnerScaleSetName: microscaler
  # Extra labels so workflows keep: runs-on: [self-hosted, linux, x64, microscaler]
  runnerScaleSetLabels:
    - self-hosted
    - linux
    - x64
  minRunners: 1
  # Pool cap. Five k8s-runner-* nodes (4CPU/12G); ~4 jobs/node at 20.
  maxRunners: 20
  template:
    spec:
      serviceAccountName: microscaler-gha-rs-no-permission
      nodeSelector:
        node.microscaler.io/role: gha-runner
      tolerations:
        - key: node.microscaler.io/gha-runner
          operator: Equal
          value: "true"
          effect: NoSchedule
      topologySpreadConstraints:
        # Prefer even spread across k8s-runner-* hostnames.
        # ScheduleAnyway so one node down does not stall the pool.
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              actions.github.com/scale-set-name: microscaler
      restartPolicy: Never
      initContainers:
        - name: init-dind-externals
          # Must match runner image (copies /home/runner/externals).
          image: 10.177.76.220:5000/microscaler/actions-runner:2.336.0-ci3
          imagePullPolicy: IfNotPresent
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
        - name: dind
          image: docker:27-dind
          # Bootstrap proxy CA then start dockerd. Classic --registry-mirror is
          # Docker Hub only; this MITM proxy caches ghcr.io (and hub) pulls.
          # Revert: restore plain `args: [dockerd, --host=..., --group=123]`.
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              PROXY_HOST=dind-registry-proxy.arc-runners.svc.cluster.local
              PROXY_URL="http://${PROXY_HOST}:3128"
              CA=/usr/local/share/ca-certificates/dind-registry-proxy.crt
              i=0
              # Must not use HTTP_PROXY when fetching the CA (chicken/egg).
              while [ "$i" -lt 60 ]; do
                if env -u HTTP_PROXY -u HTTPS_PROXY -u http_proxy -u https_proxy \
                  wget -q -O "$CA" "${PROXY_URL}/ca.crt"; then
                  break
                fi
                i=$((i + 1))
                sleep 2
              done
              if [ ! -s "$CA" ]; then
                echo "dind-registry-proxy CA not available; starting dockerd without mirror" >&2
              else
                update-ca-certificates 2>/dev/null \
                  || cat "$CA" >> /etc/ssl/certs/ca-certificates.crt
              fi
              exec dockerd-entrypoint.sh dockerd \
                --host=unix:///var/run/docker.sock \
                --group=123
          env:
            - name: DOCKER_GROUP_GID
              value: "123"
            # Transparent registry cache (see dind-registry-proxy.yaml).
            - name: HTTP_PROXY
              value: http://dind-registry-proxy.arc-runners.svc.cluster.local:3128
            - name: HTTPS_PROXY
              value: http://dind-registry-proxy.arc-runners.svc.cluster.local:3128
            - name: NO_PROXY
              value: localhost,127.0.0.1,10.0.0.0/8,10.177.76.0/24,.svc,.cluster.local,registry.shared-k8s.local,registry.registry.svc
          securityContext:
            privileged: true
          # Native sidecar (k8s 1.29+): keep dockerd up for the runner container.
          restartPolicy: Always
          # ~768Mi + 250m CPU/pod → ≤15 runners per 12G/4CPU node.
          resources:
            requests:
              cpu: 150m
              memory: 512Mi
            limits:
              memory: 3Gi
          startupProbe:
            exec:
              command: ["docker", "info"]
            failureThreshold: 24
            periodSeconds: 5
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
      containers:
        - name: runner
          # Custom image: official actions-runner + build-essential/pip/mold/…
          # Rebuild: just arc-runner-image-build (or import to node if registry full)
          image: 10.177.76.220:5000/microscaler/actions-runner:2.336.0-ci3
          imagePullPolicy: IfNotPresent
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
              value: "120"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}
