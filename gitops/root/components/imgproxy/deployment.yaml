apiVersion: v1
kind: ConfigMap
metadata:
  name: imgproxy-config
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: imgproxy
data:
  IMGPROXY_BIND: ":5001"
  IMGPROXY_USE_ETAG: "true"
  IMGPROXY_ENABLE_WEBP_DETECTION: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imgproxy
  namespace: data
  labels:
    app: imgproxy
    app.kubernetes.io/name: imgproxy
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: imgproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imgproxy
  template:
    metadata:
      labels:
        app: imgproxy
    spec:
      containers:
        - name: imgproxy
          image: darthsim/imgproxy:v3.8.0
          ports:
            - containerPort: 5001
              name: http
          env:
            - name: IMGPROXY_BIND
              valueFrom:
                configMapKeyRef:
                  name: imgproxy-config
                  key: IMGPROXY_BIND
            - name: IMGPROXY_LOCAL_FILESYSTEM_ROOT
              value: "/"
            - name: IMGPROXY_USE_ETAG
              valueFrom:
                configMapKeyRef:
                  name: imgproxy-config
                  key: IMGPROXY_USE_ETAG
            - name: IMGPROXY_ENABLE_WEBP_DETECTION
              valueFrom:
                configMapKeyRef:
                  name: imgproxy-config
                  key: IMGPROXY_ENABLE_WEBP_DETECTION
          volumeMounts:
            - name: storage
              mountPath: /var/lib/storage
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 100m
          readinessProbe:
            exec:
              command: [imgproxy, health]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [imgproxy, health]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: minio-storage
---
apiVersion: v1
kind: Service
metadata:
  name: imgproxy
  namespace: data
  labels:
    app: imgproxy
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: imgproxy
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
      name: http
  selector:
    app: imgproxy
