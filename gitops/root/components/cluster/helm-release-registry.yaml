# twuni/docker-registry via Flux GitRepository (public). Env knobs: profile helm-values.yaml.
# Tag-prune CronJob stays custom (registry-housekeeping.yaml) — chart GC alone is insufficient.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: registry
  namespace: registry
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: cluster
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  chart:
    spec:
      chart: .
      version: "3.0.0"
      sourceRef:
        kind: GitRepository
        name: docker-registry
        namespace: flux-system
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: cluster-helm-values
      valuesKey: values.yaml
  values:
    fullnameOverride: registry
    nameOverride: registry
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.177.76.220"
