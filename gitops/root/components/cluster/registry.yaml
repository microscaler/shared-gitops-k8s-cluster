apiVersion: v1
kind: Namespace
metadata:
  name: registry
  labels:
    app.kubernetes.io/part-of: shared-k8s-cluster
  annotations:
    description: In-cluster OCI registry (replaces host kind-registry :5001)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs-iscsi
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          # v3 required: registry:2 garbage-collect --delete-untagged deletes
          # child manifests of multi-arch/OCI indexes (distribution#3178),
          # breaking pulls of buildx-pushed images. Fixed in distribution v3.
          image: registry:3
          env:
            # Allow manifest deletion via the HTTP API (used by ad-hoc cleanup;
            # nightly housekeeping CronJob prunes tags on the filesystem).
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.177.76.220"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  selector:
    app: registry
---
# In-cluster DNS name for pod image references.
apiVersion: v1
kind: Service
metadata:
  name: registry-cluster
  namespace: registry
  labels:
    app: registry
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  selector:
    app: registry
