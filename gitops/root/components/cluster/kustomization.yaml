apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - claim.yaml
  - docker-registry-gitrepository.yaml
  - helm-release-registry.yaml
  # LB must be Flux-owned (see service-registry.yaml) — Helm ClusterIP is docker-registry.
  - service-registry.yaml
  - service-registry-cluster.yaml
  # Site-specific tag prune + GC (chart GC alone does not prune tags).
  - registry-housekeeping.yaml
  - local-registry-hosting.yaml
  - metallb/ipaddresspool.yaml

# Migrated from shared-k8s-cluster/k8s/cluster (Phase 3).
# MetalLB operator itself remains Day-0; this manages the IPAddressPool + L2Advertisement.
