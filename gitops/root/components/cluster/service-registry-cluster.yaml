# In-cluster DNS name for pod image references (chart Service is LoadBalancer `registry`).
apiVersion: v1
kind: Service
metadata:
  name: registry-cluster
  namespace: registry
  labels:
    app: registry
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: cluster
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  selector:
    app: registry
    release: registry
