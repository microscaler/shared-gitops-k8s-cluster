# Dev MinIO root credentials.
# Chart (charts.min.io) expects .data.rootUser / .data.rootPassword.
# Rotate via SOPS deployment-profiles before any non-dev cluster.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: minio
type: Opaque
stringData:
  rootUser: minio
  rootPassword: minio-dev-password-change-me
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: minio-dev-password-change-me
  root-user: minio
  root-password: minio-dev-password-change-me
