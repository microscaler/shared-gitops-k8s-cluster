# Dev MinIO root credentials (same values previously in infra-secrets).
# Rotate via OpenBao / ExternalSecrets before any non-dev cluster.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: minio
type: Opaque
stringData:
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: minio-dev-password-change-me
  root-user: minio
  root-password: minio-dev-password-change-me
