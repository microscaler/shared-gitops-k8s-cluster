apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-storage
  namespace: data
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: minio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 20Gi
  volumeName: minio-pv
