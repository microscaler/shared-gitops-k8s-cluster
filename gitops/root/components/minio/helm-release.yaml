# Official MinIO Helm chart (standalone). Env knobs: profile helm-values.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: minio
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
  chart:
    spec:
      chart: minio
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: data
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: minio-helm-values
      valuesKey: values.yaml
  values:
    fullnameOverride: minio
    existingSecret: minio-credentials
    # MetalLB IPs: gitops/inventory/metallb-services.yaml (source of truth)
    service:
      type: LoadBalancer
      port: "9000"
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.177.76.226"
        metallb.universe.tf/allow-shared-ip: "minio"
    consoleService:
      type: LoadBalancer
      port: "9001"
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.177.76.226"
        metallb.universe.tf/allow-shared-ip: "minio"
