# Official MinIO Helm chart (standalone). Retain PVC minio-storage via existingClaim.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: minio
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
  chart:
    spec:
      chart: minio
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: data
      interval: 24h
  values:
    fullnameOverride: minio
    mode: standalone
    replicas: 1
    image:
      repository: quay.io/minio/minio
      tag: RELEASE.2025-09-07T16-13-09Z
    # Existing hostPath data was written with `minio server /data`
    mountPath: /data
    bucketRoot: /data
    existingSecret: minio-credentials
    persistence:
      enabled: true
      existingClaim: minio-storage
    service:
      type: LoadBalancer
      port: "9000"
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.177.76.226"
        metallb.universe.tf/allow-shared-ip: "minio"
    consoleService:
      type: LoadBalancer
      port: "9001"
      annotations:
        metallb.universe.tf/loadBalancerIPs: "10.177.76.226"
        metallb.universe.tf/allow-shared-ip: "minio"
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 512Mi
        cpu: 500m
    users: []
    policies: []
    ignoreChartChecksums: true
