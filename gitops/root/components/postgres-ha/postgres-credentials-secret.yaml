# Dev credentials Secret kept for apps that still mount postgres-credentials
# (hand-rolled stack used these keys). Bitnami HA also gets passwords via Helm values.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres-ha
type: Opaque
stringData:
  postgres-password: postgres
  postgres-replication-password: postgres
  # Bitnami-style aliases (handy for ExternalSecrets later)
  password: postgres
  postgres-password-bitnami: postgres
  repmgr-password: postgres
  admin-password: postgres
