# Bitnami PostgreSQL HA (repmgr + Pgpool). Images from bitnamilegacy (Bitnami catalog move).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-ha
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres-ha
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      # Prior failed revisions left no rollback target; disable until a clean release exists.
      remediateLastFailure: false
      retries: 3
  chart:
    spec:
      chart: postgresql-ha
      version: "16.3.2"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: data
      interval: 24h
  values:
    global:
      # zfs-iscsi (democratic-csi) — see docs/storage-csi-zfs.md
      # STS volumeClaimTemplates are immutable: storage-class cutovers delete STS+PVCs.
      defaultStorageClass: zfs-iscsi
      security:
        # Required when pulling bitnamilegacy/* instead of bitnami/*
        allowInsecureImages: true

    fullnameOverride: postgres-ha

    postgresql:
      image:
        registry: docker.io
        repository: bitnamilegacy/postgresql-repmgr
        tag: 17.6.0-debian-12-r2
      replicaCount: 3
      username: postgres
      password: postgres
      database: postgres
      postgresPassword: postgres
      repmgrUsername: repmgr
      repmgrPassword: postgres
      repmgrDatabase: repmgr
      # Hard anti-affinity: primary + 2 standbys must land on different nodes.
      # Soft was already spreading them; hard makes it a scheduling guarantee.
      podAntiAffinityPreset: hard
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: postgresql
              app.kubernetes.io/instance: postgres-ha
              app.kubernetes.io/name: postgresql-ha
      # Give the scheduler explicit budget (workers are ~90% CPU-request packed).
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
      # Standbys need longer than default while repmgr clones from primary
      livenessProbe:
        enabled: true
        initialDelaySeconds: 120
        periodSeconds: 20
        timeoutSeconds: 10
        failureThreshold: 30
      readinessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 60
      # Reverse DNS of pod IPs times out (~5s/conn) and breaks repmgr clone + local ping.
      # Use chart knobs — do NOT set these via extraEnvVars (duplicates chart env keys → SSA fail).
      # Do NOT set postgresql.configuration to a snippet — it replaces the entire conf and
      # Postgres fatal: "syntax error near token =" (seen 2026-07-16 on zfs-iscsi cutover).
      audit:
        logHostname: false
      repmgrConnectTimeout: 30

    pgpool:
      image:
        registry: docker.io
        repository: bitnamilegacy/pgpool
        tag: 4.6.3-debian-12-r0
      replicaCount: 2
      podAntiAffinityPreset: hard
      adminUsername: admin
      adminPassword: postgres
      logHostname: false
      # Must be stable — random chart default drifts from DB after upgrades
      srCheckUsername: sr_check_user
      srCheckPassword: postgres
      srCheckDatabase: postgres
      # Custom users that apps may use via Pgpool (dev parity)
      customUsers:
        usernames: ""
        passwords: ""

    metrics:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/postgres-exporter
        tag: 0.17.1-debian-12-r16

    volumePermissions:
      enabled: true
      image:
        registry: docker.io
        repository: bitnamilegacy/os-shell
        tag: 12-debian-12-r51

    persistence:
      enabled: true
      storageClass: zfs-iscsi
      size: 10Gi

    # Chart services stay ClusterIP; LoadBalancer alias is postgres-lb-service.yaml
    service:
      type: ClusterIP
      ports:
        postgresql: 5432
