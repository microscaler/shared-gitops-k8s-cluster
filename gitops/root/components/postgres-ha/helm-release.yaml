# Bitnami PostgreSQL HA (repmgr + Pgpool). Env knobs: profile helm-values.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-ha
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres-ha
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      # Prior failed revisions left no rollback target; disable until a clean release exists.
      remediateLastFailure: false
      retries: 3
  chart:
    spec:
      chart: postgresql-ha
      version: "16.3.2"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: data
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: postgres-ha-helm-values
      valuesKey: values.yaml
  values:
    # Identity / secret wiring (env overlays must not redefine these).
    fullnameOverride: postgres-ha
    postgresql:
      existingSecret: postgres-credentials
      # Hard anti-affinity topology is instance-bound; keep with the release.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: postgresql
              app.kubernetes.io/instance: postgres-ha
              app.kubernetes.io/name: postgresql-ha
      # Do NOT set postgresql.configuration to a snippet — it replaces the entire conf.
      # Do NOT set reverse-DNS knobs via extraEnvVars (duplicates chart env keys → SSA fail).
    pgpool:
      existingSecret: postgres-credentials
      customUsersSecret: postgres-credentials
    service:
      type: ClusterIP
      ports:
        postgresql: 5432
