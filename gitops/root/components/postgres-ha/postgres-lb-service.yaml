# Compatibility LoadBalancer — preserves historical Service name + MetalLB IP used by
# apps / LAN proxy (was hand-rolled postgres-primary Service).
# Selects Bitnami Pgpool pods from HelmRelease postgres-ha.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres-ha
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.177.76.224"
spec:
  type: LoadBalancer
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql-ha
    app.kubernetes.io/instance: postgres-ha
    app.kubernetes.io/component: pgpool
