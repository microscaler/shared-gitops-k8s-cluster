# Same provisioner as k3s local-path, but Retain so STS/PVC deletes
# do not wipe host disks. Use this for stateful platform data.
# See docs/postgres-pvc-reuse.md
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path-retain
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres-ha
provisioner: rancher.io/local-path
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
