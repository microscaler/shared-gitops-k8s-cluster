apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-storage
  namespace: data
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs-iscsi
  resources:
    requests:
      storage: 1Gi
