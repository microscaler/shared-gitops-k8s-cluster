# Bitnami Redis (standalone). Env knobs: profile helm-values.yaml.
# Service DNS `redis` is a thin alias (service-redis.yaml) — chart exposes redis-master.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: redis
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      remediateLastFailure: false
      retries: 5
  chart:
    spec:
      chart: redis
      version: "20.6.3"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: data
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: redis-helm-values
      valuesKey: values.yaml
  values:
    fullnameOverride: redis
