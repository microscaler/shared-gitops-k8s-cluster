# MQTT broker in ns data. Deployment/Service keep the historical name `mosquitto`
# (clients use MQTT_HOST=mosquitto / mosquitto.data.svc). Implementation is NanoMQ.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: data
  labels:
    app: mosquitto
    app.kubernetes.io/name: nanomq
    app.kubernetes.io/instance: mosquitto
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: mosquitto
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
        app.kubernetes.io/name: nanomq
        app.kubernetes.io/instance: mosquitto
        app.kubernetes.io/component: broker
        app.kubernetes.io/part-of: shared-gitops-k8s-cluster
        gitops.microscaler.io/stack: mosquitto
    spec:
      containers:
        - name: nanomq
          image: emqx/nanomq:0.24.14
          imagePullPolicy: IfNotPresent
          args:
            - nanomq
            - start
            - --conf
            - /etc/nanomq/nanomq.conf
          ports:
            - name: mqtt
              containerPort: 1883
              protocol: TCP
            - name: ws
              containerPort: 9001
              protocol: TCP
          volumeMounts:
            - name: conf
              mountPath: /etc/nanomq/nanomq.conf
              subPath: nanomq.conf
              readOnly: true
          # No readinessProbe — TCP probes spam NanoMQ logs; single-replica Recreate.
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: conf
          configMap:
            name: mosquitto-nanomq-conf
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: data
  labels:
    app: mosquitto
    app.kubernetes.io/name: nanomq
    app.kubernetes.io/instance: mosquitto
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: mosquitto
spec:
  type: ClusterIP
  selector:
    app: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
      protocol: TCP
    - name: ws
      port: 9001
      targetPort: ws
      protocol: TCP
