# Fluvio via Flux: GitRepository (public) → fluvio-sys (CRDs) + fluvio-app (SC).
# SpuGroup remains a CR (same as `fluvio cluster create spg`).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - fluvio-gitrepository.yaml
  - helm-release-fluvio-sys.yaml
  - helm-release-fluvio-app.yaml
  - service-fluvio-sc.yaml
  - fluvio-spugroup.yaml
