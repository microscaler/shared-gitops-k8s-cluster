# Fluvio SC + RBAC + services. Env knobs: profile helm-values.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluvio-app
  namespace: pipeline
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pipeline
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: fluvio-sys
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  chart:
    spec:
      chart: k8-util/helm/fluvio-app
      sourceRef:
        kind: GitRepository
        name: fluvio
        namespace: flux-system
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: pipeline-helm-values
      valuesKey: values.yaml
  values:
    # Keep DNS alias fluvio-sc via service-fluvio-sc.yaml (ClusterIP).
    service:
      type: LoadBalancer
