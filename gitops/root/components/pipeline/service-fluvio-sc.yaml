# Compatibility alias — chart exposes fluvio-sc-public; prior render used fluvio-sc.
apiVersion: v1
kind: Service
metadata:
  name: fluvio-sc
  namespace: pipeline
  labels:
    app: fluvio-sc
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pipeline
spec:
  type: ClusterIP
  ports:
    - port: 9003
      targetPort: 9003
      name: sc-api
  selector:
    app: fluvio-sc
