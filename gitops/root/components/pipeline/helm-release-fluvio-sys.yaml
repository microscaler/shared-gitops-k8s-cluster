# Fluvio CRDs (cluster-scoped). Chart from public GitRepository `fluvio`.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluvio-sys
  namespace: pipeline
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pipeline
spec:
  interval: 30m
  timeout: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
      retries: 3
  chart:
    spec:
      chart: k8-util/helm/fluvio-sys
      sourceRef:
        kind: GitRepository
        name: fluvio
        namespace: flux-system
      interval: 24h
