# Public upstream charts: https://github.com/infinyon/fluvio/tree/master/k8-util/helm
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fluvio
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pipeline
spec:
  interval: 1h
  timeout: 3m
  url: https://github.com/infinyon/fluvio.git
  ref:
    tag: v0.18.1
  ignore: |
    /*
    !/k8-util/
    !/k8-util/**
