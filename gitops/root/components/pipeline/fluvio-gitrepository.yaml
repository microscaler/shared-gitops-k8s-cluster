# Public upstream charts — no vendor copy.
# https://github.com/infinyon/fluvio/tree/master/k8-util/helm
#
# Pin past v0.18.1: that tag's topics CRD has an invalid OpenAPI field and
# fails Helm server-side apply. This commit includes the fix on master.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fluvio
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: pipeline
spec:
  interval: 1h
  timeout: 3m
  url: https://github.com/infinyon/fluvio.git
  ref:
    commit: 52673942c1c7364f36f2e05da972436f761243cd
  ignore: |
    /*
    !/k8-util/
    !/k8-util/**
