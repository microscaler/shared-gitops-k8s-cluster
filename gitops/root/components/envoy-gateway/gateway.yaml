# Shared edge Gateway for *.dev.microscaler.local.
# App routing = HTTPRoute CRs (GitOps), not lan-http-vhosts.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: microscaler-dev
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/edge: "*.dev.microscaler.local"
spec:
  gatewayClassName: microscaler-dev
  listeners:
    - name: http
      hostname: "*.dev.microscaler.local"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "*.dev.microscaler.local"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: dev-microscaler-local-tls
            namespace: cert-manager
      allowedRoutes:
        namespaces:
          from: All
