# Allow Gateway in envoy-gateway-system to use the wildcard TLS Secret in cert-manager.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: microscaler-dev-tls
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/edge: "*.dev.microscaler.local"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Secret
      name: dev-microscaler-local-tls
