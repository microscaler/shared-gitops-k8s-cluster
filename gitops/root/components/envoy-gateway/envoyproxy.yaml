# Data-plane Service shape + MetalLB VIP. GatewayClass parametersRef points here.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: microscaler-dev
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/edge: "*.dev.microscaler.local"
    # Keep aligned with config/loadbalancer-ips.env ENVOY_GATEWAY_LB_IP
    metallb.universe.tf/loadBalancerIPs: "10.177.76.234"
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/loadBalancerIPs: "10.177.76.234"
          gitops.microscaler.io/edge: "*.dev.microscaler.local"
