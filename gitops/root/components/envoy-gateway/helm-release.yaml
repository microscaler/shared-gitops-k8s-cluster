# Official Envoy Gateway chart — installs Gateway API + EG CRDs (crds.enabled).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/edge: "*.dev.microscaler.local"
spec:
  interval: 30m
  timeout: 15m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
      retries: 3
  test:
    enable: false
  chart:
    spec:
      chart: gateway-helm
      version: "v1.8.2"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: envoy-gateway-system
      interval: 24h
  values:
    crds:
      enabled: true
    deployment:
      replicas: 1
