# Tilt UIs run on the Multipass host (ms02). From in-cluster Envoy, reach them via
# the mpqemubr0 host IP (10.177.76.1), not 127.0.0.1.
---
apiVersion: v1
kind: Service
metadata:
  name: tilt-sesame-idam
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/hostname: tilt-sesame.dev.microscaler.local
    gitops.microscaler.io/gateway: microscaler-dev
spec:
  ports:
    - name: http
      port: 10351
      targetPort: 10351
---
apiVersion: v1
kind: Endpoints
metadata:
  name: tilt-sesame-idam
  namespace: envoy-gateway-system
  labels:
    gitops.microscaler.io/stack: envoy-gateway
subsets:
  - addresses:
      - ip: 10.177.76.1
    ports:
      - name: http
        port: 10351
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tilt-sesame-idam
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/hostname: tilt-sesame.dev.microscaler.local
    gitops.microscaler.io/gateway: microscaler-dev
spec:
  parentRefs:
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: https
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - tilt-sesame.dev.microscaler.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: tilt-sesame-idam
          port: 10351
---
apiVersion: v1
kind: Service
metadata:
  name: tilt-hauliage
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/hostname: tilt-hauliage.dev.microscaler.local
    gitops.microscaler.io/gateway: microscaler-dev
spec:
  ports:
    - name: http
      port: 10352
      targetPort: 10352
---
apiVersion: v1
kind: Endpoints
metadata:
  name: tilt-hauliage
  namespace: envoy-gateway-system
  labels:
    gitops.microscaler.io/stack: envoy-gateway
subsets:
  - addresses:
      - ip: 10.177.76.1
    ports:
      - name: http
        port: 10352
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tilt-hauliage
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/hostname: tilt-hauliage.dev.microscaler.local
    gitops.microscaler.io/gateway: microscaler-dev
spec:
  parentRefs:
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: https
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - tilt-hauliage.dev.microscaler.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: tilt-hauliage
          port: 10352
