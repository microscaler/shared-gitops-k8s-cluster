---
# Browser entry: https://resurrection.dev.microscaler.local/
# Hub has no HTML at / — redirect apex to /health so the subdomain is useful.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: resurrection-hub
  namespace: cylon
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/hostname: resurrection.dev.microscaler.local
    gitops.microscaler.io/gateway: microscaler-dev
spec:
  parentRefs:
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: https
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - resurrection.dev.microscaler.local
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
            statusCode: 302
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: resurrection-hub
          port: 14000
