# Platform browser UIs → Envoy Gateway (no lan-proxy / MetalLB host routing).
# L4-only traffic (Postgres, Redis, SMTP, OTel, registry, …) stays on MetalLB + thin haproxy.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mailpit
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/hostname: mailpit.dev.microscaler.local
    gitops.microscaler.io/gateway: microscaler-dev
spec:
  parentRefs:
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: https
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - mailpit.dev.microscaler.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mailpit
          port: 8025
