# Platform bootstrap route for hauliage/loadlinker frontend.
# Product source of truth: hauliage/k8s/frontend/httproute.yaml (Tilt).
# Keep hostnames in sync so Flux still serves the hosts if Tilt is down.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hauliage-frontend
  namespace: loadlinker
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/hostname: loadlinker.dev.microscaler.local
    gitops.microscaler.io/hostname.alias: hauliage.dev.microscaler.local
    gitops.microscaler.io/gateway: microscaler-dev
    gitops.microscaler.io/owned-by: hauliage/k8s/frontend/httproute.yaml
spec:
  parentRefs:
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: https
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - loadlinker.dev.microscaler.local
    - hauliage.dev.microscaler.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 8080
