# L4 through Envoy — replaces per-service haproxy → MetalLB hops.
# Listener ports match lan-exposure.yaml (Mac → haproxy → Envoy VIP → here).
---
# k8s API (Multipass CP) — static Endpoints on the host bridge IP.
apiVersion: v1
kind: Service
metadata:
  name: k8s-apiserver
  namespace: envoy-gateway-system
  labels:
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/l4: k8s-api
spec:
  ports:
    - name: https
      port: 6443
      targetPort: 6443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: k8s-apiserver
  namespace: envoy-gateway-system
  labels:
    gitops.microscaler.io/stack: envoy-gateway
subsets:
  - addresses:
      # Keep in sync with config/cluster.env K8S_CP_IP
      - ip: 10.177.76.137
    ports:
      - name: https
        port: 6443
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: k8s-api
  namespace: envoy-gateway-system
  labels:
    gitops.microscaler.io/stack: envoy-gateway
  annotations:
    gitops.microscaler.io/l4: "6443"
    gitops.microscaler.io/gateway: microscaler-dev
spec:
  parentRefs:
    - name: microscaler-dev
      namespace: envoy-gateway-system
      sectionName: tcp-k8s-api
  rules:
    - backendRefs:
        - name: k8s-apiserver
          port: 6443
---
