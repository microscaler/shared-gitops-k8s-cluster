apiVersion: apps/v1
kind: Deployment
metadata:
  name: freeradius
  namespace: cylon
  labels:
    app: freeradius
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freeradius
  template:
    metadata:
      labels:
        app: freeradius
    spec:
      containers:
        - name: freeradius
          image: freeradius/freeradius-server:latest-alpine
          ports:
            - containerPort: 1812
              protocol: UDP
            - containerPort: 1813
              protocol: UDP
          volumeMounts:
            - name: freeradius-config
              mountPath: /etc/raddb/clients.conf
              subPath: clients.conf
            - name: freeradius-config
              mountPath: /etc/raddb/mods-config/files/authorize
              subPath: users
      volumes:
        - name: freeradius-config
          configMap:
            name: freeradius-config
