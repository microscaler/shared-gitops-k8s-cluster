# Official LiteLLM chart (BerriAI). Env knobs: profile helm-values-routellm.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: routellm
  namespace: cylon
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: cylon-infra
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  test:
    enable: false
  chart:
    spec:
      chart: litellm-helm
      version: "1.92.0"
      sourceRef:
        kind: HelmRepository
        name: litellm
        namespace: cylon
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: cylon-infra-helm-values
      valuesKey: routellm.yaml
  values:
    # UI via Envoy HTTPRoute (routellm.dev); L4 via Envoy TCP :4000 (guest VMs).
    service:
      type: ClusterIP
      port: 4000
