apiVersion: apps/v1
kind: Deployment
metadata:
  name: routellm
  namespace: cylon
  labels:
    app: routellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: routellm
  template:
    metadata:
      labels:
        app: routellm
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: routellm-config
          command: ["/bin/sh", "-ec"]
          args:
            # YAML | strips common indent; relative indent in the heredoc is preserved.
            - |
              cat > /config/config.yaml <<EOF
              model_list:
                - model_name: ${VLLM_DEFAULT_MODEL}
                  litellm_params:
                    model: hosted_vllm/${VLLM_DEFAULT_MODEL}
                    api_base: ${VLLM_API_BASE}
                    api_key: dummy
                - model_name: ${VLLM_MODEL_GPT4O_MINI}
                  litellm_params:
                    model: hosted_vllm/${VLLM_MODEL_GPT4O_MINI}
                    api_base: ${VLLM_API_BASE}
                    api_key: dummy
                - model_name: ${VLLM_MODEL_QWEN3}
                  litellm_params:
                    model: hosted_vllm/${VLLM_MODEL_QWEN3}
                    api_base: ${VLLM_API_BASE}
                    api_key: dummy
              litellm_settings:
                drop_params: true
              EOF
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml"]
          ports:
            - containerPort: 4000
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          emptyDir: {}
