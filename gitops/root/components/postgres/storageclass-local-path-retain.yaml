# Same provisioner as k3s local-path, but Retain so PVC deletes do not wipe host disks.
# Primary shared-dev StorageClass is zfs-iscsi (democratic-csi); this remains for local-path PVCs.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path-retain
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres
provisioner: rancher.io/local-path
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
