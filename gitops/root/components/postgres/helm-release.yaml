# Lifeguard charts/postgres — primary Deployment; Service `postgres` selects primary.
# Replaces Bitnami postgresql-ha + Pgpool (stack postgres-ha).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  chart:
    spec:
      chart: charts/postgres
      sourceRef:
        kind: GitRepository
        name: lifeguard-charts
        namespace: flux-system
      interval: 5m
  valuesFrom:
    - kind: ConfigMap
      name: postgres-helm-values
      valuesKey: values.yaml
  values:
    # Identity wiring — must not be overridden by env overlays with wrong secret keys.
    auth:
      existingSecret: postgres-credentials
      passwordKey: postgres-password
      replicationPasswordKey: postgres-replication-password
