# Lifeguard Helm chart charts/postgres (primary + streaming replicas).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  chart:
    spec:
      chart: charts/postgres
      # Git-sourced chart: reconcile on artifact revision, not Chart.yaml version.
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: lifeguard-charts
        namespace: flux-system
      interval: 5m
  valuesFrom:
    - kind: ConfigMap
      name: postgres-helm-values
      valuesKey: values.yaml
