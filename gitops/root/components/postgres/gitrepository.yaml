# Lifeguard-owned primary-direct Postgres chart (no Pgpool).
# https://github.com/microscaler/lifeguard/tree/main/charts/postgres
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: lifeguard-charts
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres
spec:
  interval: 1m
  timeout: 3m
  url: ssh://git@github.com/microscaler/lifeguard.git
  ref:
    branch: main
  secretRef:
    name: gitops-auth
  ignore: |
    /*
    !/charts/
    !/charts/**
