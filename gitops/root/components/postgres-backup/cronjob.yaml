apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: data
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres-backup
spec:
  # Every 6 hours — enough for empty/dev HA while we rebuild schemas
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: dump
              image: postgres:17-alpine
              command: ["/bin/sh", "/scripts/backup.sh"]
              env:
                - name: POSTGRES_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-backup-config
                      key: POSTGRES_HOST
                - name: POSTGRES_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-backup-config
                      key: POSTGRES_PORT
                - name: POSTGRES_USER
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-backup-config
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: postgres-password
                - name: REQUIRED_DATABASES
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-backup-config
                      key: REQUIRED_DATABASES
              volumeMounts:
                - name: dump
                  mountPath: /dump
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          containers:
            - name: upload
              image: minio/mc:RELEASE.2025-08-13T08-35-41Z
              command: ["/bin/sh", "/scripts/upload.sh"]
              env:
                - name: MINIO_ENDPOINT
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-backup-config
                      key: MINIO_ENDPOINT
                - name: MINIO_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-backup-config
                      key: MINIO_BUCKET
                - name: RETENTION_DAYS
                  valueFrom:
                    configMapKeyRef:
                      name: postgres-backup-config
                      key: RETENTION_DAYS
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: MINIO_ROOT_USER
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: MINIO_ROOT_PASSWORD
              volumeMounts:
                - name: dump
                  mountPath: /dump
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: dump
              emptyDir: {}
            - name: scripts
              configMap:
                name: postgres-backup-script
                defaultMode: 0755
