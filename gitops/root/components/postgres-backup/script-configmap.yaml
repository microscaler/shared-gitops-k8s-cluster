# Logical dump of all Postgres roles/DBs → gzip → MinIO bucket postgres-backups.
# Connects to the Bitnami primary pod (not Pgpool) for a consistent dump.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-backup-script
  namespace: data
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: postgres-backup
data:
  backup.sh: |
    #!/bin/sh
    set -eu
    STAMP=$(date -u +%Y%m%dT%H%M%SZ)
    OUT="/dump/postgres-all-${STAMP}.sql.gz"
    echo "dumping to ${OUT}"
    export PGPASSWORD="${POSTGRES_PASSWORD}"
    pg_dumpall \
      -h "${POSTGRES_HOST}" \
      -p "${POSTGRES_PORT}" \
      -U "${POSTGRES_USER}" \
      --clean \
      --if-exists \
      | gzip -c > "${OUT}"
    ls -lh "${OUT}"
    echo "dump complete"
  upload.sh: |
    #!/bin/sh
    set -eu
    mc alias set backup "http://${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
    mc mb --ignore-existing "backup/${MINIO_BUCKET}"
    FILE=$(ls -1 /dump/postgres-all-*.sql.gz | head -n 1)
    DEST="backup/${MINIO_BUCKET}/$(basename "${FILE}")"
    echo "uploading ${FILE} -> ${DEST}"
    mc cp "${FILE}" "${DEST}"
    # Keep last N days of dumps (dev default: 7)
    mc rm --recursive --force --older-than "${RETENTION_DAYS}d" "backup/${MINIO_BUCKET}/" || true
    echo "upload complete; listing bucket:"
    mc ls "backup/${MINIO_BUCKET}/"
