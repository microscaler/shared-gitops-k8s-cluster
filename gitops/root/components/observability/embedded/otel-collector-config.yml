receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  # Data Prepper OTLP ports (ClusterIP service data-prepper)
  otlp/traces:
    endpoint: data-prepper.observability.svc.cluster.local:21890
    tls:
      insecure: true
  otlp/metrics:
    endpoint: data-prepper.observability.svc.cluster.local:21891
    tls:
      insecure: true
  otlp/logs:
    endpoint: data-prepper.observability.svc.cluster.local:21892
    tls:
      insecure: true
  # Keep a local Prometheus scrape endpoint for quick debugging (not long-term store)
  prometheus:
    endpoint: "0.0.0.0:9464"
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/traces, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/metrics, prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/logs, debug]
