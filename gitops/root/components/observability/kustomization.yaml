# OpenSearch + Dashboards + Data Prepper + OTel Collector (official Helm charts).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - namespace.yaml
  # Config + secrets: deployment-configuration/profiles/dev/observability (Flux profile-config)
  - helmrepository.yaml
  - helmrepository-otel.yaml
  - helm-release-opensearch.yaml
  - helm-release-dashboards.yaml
  - helm-release-data-prepper.yaml
  - helm-release-otel.yaml
  - dashboards-lb-service.yaml
  - observability-provisioner-cronjob.yaml

configMapGenerator:
  - name: observability-provisioner
    files:
      - provision-observability.py
