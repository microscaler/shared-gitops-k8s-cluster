# OpenSearch + Dashboards + Data Prepper + OTel Collector (official Helm charts).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - namespace.yaml
  # Config + secrets: deployment-configuration/profiles/dev/observability (Flux profile-config)
  - helmrepository.yaml
  - helmrepository-otel.yaml
  - helm-release-opensearch.yaml
  - helm-release-dashboards.yaml
  - helm-release-data-prepper.yaml
  - helm-release-otel.yaml
  - dashboards-lb-service.yaml
  - observability-provisioner-cronjob.yaml

configMapGenerator:
  - name: observability-provisioner
    files:
      - provision-observability.py
      - dashboard_definitions.py
  - name: observability-dashboards
    files:
      - dashboards/platform-postgres-connections.ndjson
      - dashboards/platform-data-namespace.ndjson
      - dashboards/platform-apm-correlation.ndjson
      - dashboards/loadlinker-health.ndjson
      - dashboards/loadlinker-bff-edge.ndjson
      - dashboards/loadlinker-sesame-auth.ndjson
      - dashboards/sesame-platform-health.ndjson
      - dashboards/sesame-auth-critical-path.ndjson
