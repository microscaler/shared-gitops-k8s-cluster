# OpenSearch + Dashboards + Data Prepper (Helm) + OTel collector (raw).
# Legacy Grafana/Loki/Prometheus/Jaeger/Promtail removed — telemetry goes OTel → Data Prepper → OpenSearch.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - namespace.yaml
  # Secrets: deployment-configuration/profiles/dev/observability (Flux profile-secrets)
  - helmrepository.yaml
  - helm-release-opensearch.yaml
  - helm-release-dashboards.yaml
  - helm-release-data-prepper.yaml
  - dashboards-lb-service.yaml
  - otel-collector.yaml

configMapGenerator:
  - name: otel-collector-config
    files:
      - config.yaml=embedded/otel-collector-config.yml
    options:
      disableNameSuffixHash: true
