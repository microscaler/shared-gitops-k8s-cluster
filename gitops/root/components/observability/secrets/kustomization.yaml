# Flux-reachable copy of deployment-profiles/dev/observability/application.secrets.env
# Keep ciphertext in sync when rotating secrets (canonical path is deployment-profiles/).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

secretGenerator:
  - name: opensearch-credentials
    envs:
      - application.secrets.env

generatorOptions:
  disableNameSuffixHash: true
  immutable: false
