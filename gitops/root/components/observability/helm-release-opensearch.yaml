# Single-node OpenSearch (dev). Env knobs: profile helm-values-opensearch.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch
  namespace: observability
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: observability
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
    disableWait: false
  upgrade:
    remediation:
      remediateLastFailure: true
  chart:
    spec:
      chart: opensearch
      version: "2.38.0"
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: observability
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: observability-helm-values
      valuesKey: opensearch.yaml
  values:
    envFrom:
      - secretRef:
          name: opensearch-credentials
