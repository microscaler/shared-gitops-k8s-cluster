# Single-node OpenSearch (dev). Security plugin disabled for Multipass.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch
  namespace: observability
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: observability
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
    disableWait: false
  upgrade:
    remediation:
      remediateLastFailure: true
  chart:
    spec:
      chart: opensearch
      version: "2.38.0"
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: observability
      interval: 24h
  values:
    clusterName: opensearch
    nodeGroup: nodes
    singleNode: true
    replicas: 1

    # Disable OpenSearch Security (dev only)
    securityConfig:
      enabled: false
    extraEnvs:
      - name: DISABLE_INSTALL_DEMO_CONFIG
        value: "true"
      - name: DISABLE_SECURITY_PLUGIN
        value: "true"
    envFrom:
      - secretRef:
          name: opensearch-credentials

    config:
      opensearch.yml: |
        cluster.name: opensearch
        network.host: 0.0.0.0
        discovery.type: single-node
        plugins.security.disabled: true

    opensearchJavaOpts: "-Xmx768M -Xms768M"

    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi

    persistence:
      enabled: true
      enableInitChown: true
      storageClass: local-path-retain
      size: 30Gi
      accessModes:
        - ReadWriteOnce

    # Multipass workers need vm.max_map_count
    sysctlInit:
      enabled: true

    antiAffinity: soft

    service:
      type: ClusterIP
      annotations: {}
