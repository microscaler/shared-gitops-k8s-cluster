apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-dashboards
  namespace: observability
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: observability
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: opensearch
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
  chart:
    spec:
      chart: opensearch-dashboards
      version: "2.34.0"
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: observability
      interval: 24h
  values:
    opensearchHosts: "http://opensearch-nodes:9200"

    # Chart service stays ClusterIP; MetalLB alias is dashboards-lb-service.yaml
    service:
      type: ClusterIP
      port: 5601

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

    # Security plugin off on the cluster → no TLS/auth to OS
    opensearchAccount:
      secret: ""
    extraEnvs:
      - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
        value: "true"
