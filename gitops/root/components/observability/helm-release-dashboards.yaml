# OpenSearch Dashboards. Env knobs: profile helm-values-dashboards.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-dashboards
  namespace: observability
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: observability
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: opensearch
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
  chart:
    spec:
      chart: opensearch-dashboards
      version: "2.34.0"
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: observability
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: observability-helm-values
      valuesKey: dashboards.yaml
