# OTLP ingest → OpenSearch indices (traces / metrics / logs).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: data-prepper
  namespace: observability
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: observability
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: opensearch
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
  chart:
    spec:
      chart: data-prepper
      version: "0.3.1"
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: observability
      interval: 24h
  values:
    fullnameOverride: data-prepper
    replicaCount: 1

    config:
      data-prepper-config.yaml: |
        ssl: false
      log4j2-rolling.properties: |
        status = error
        name = PropertiesConfig
        appender.console.type = Console
        appender.console.name = STDOUT
        appender.console.layout.type = PatternLayout
        appender.console.layout.pattern = %d{ISO8601} [%t] %-5p %40C - %m%n
        rootLogger.level = info
        rootLogger.appenderRef.stdout.ref = STDOUT

    pipelineConfig:
      enabled: true
      demoPipeline: "false"
      config:
        otel-trace-pipeline:
          workers: 2
          delay: 100
          source:
            otel_trace_source:
              ssl: false
              port: 21890
          sink:
            - opensearch:
                hosts: ["http://opensearch-nodes:9200"]
                insecure: true
                index_type: trace-analytics-raw
        otel-metrics-pipeline:
          workers: 2
          delay: 100
          source:
            otel_metrics_source:
              ssl: false
              port: 21891
          sink:
            - opensearch:
                hosts: ["http://opensearch-nodes:9200"]
                insecure: true
                index: otel-v1-apm-metrics
        otel-logs-pipeline:
          workers: 2
          delay: 100
          source:
            otel_logs_source:
              ssl: false
              port: 21892
          sink:
            - opensearch:
                hosts: ["http://opensearch-nodes:9200"]
                insecure: true
                index: otel-v1-apm-logs

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
