# Preserve historical Grafana MetalLB IP for LAN proxy / bookmarks → Dashboards UI.
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards-lb
  namespace: observability
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: observability
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.177.76.227"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      protocol: TCP
  selector:
    app.kubernetes.io/name: opensearch-dashboards
