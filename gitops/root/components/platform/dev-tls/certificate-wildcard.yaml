# Wildcard cert for *.dev.microscaler.local — referenced by Envoy Gateway
# (gitops/root/components/envoy-gateway/gateway.yaml). Optional haproxy sync is unused
# once lan-proxy only TCP-forwards :443 to the Envoy VIP.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dev-microscaler-local-wildcard
  namespace: cert-manager
spec:
  secretName: dev-microscaler-local-tls
  issuerRef:
    name: dev-microscaler-ca
    kind: ClusterIssuer
  dnsNames:
    - dev.microscaler.local
    - "*.dev.microscaler.local"
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
