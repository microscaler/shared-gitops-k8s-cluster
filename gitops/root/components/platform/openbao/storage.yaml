# Retain hostPath PV for OpenBao file storage. Chart STS creates PVC
# data-openbao-0 which binds here (local-storage + size + node affinity).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: openbao-data-pv
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: platform-openbao
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/lib/openbao/data
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-worker-1
