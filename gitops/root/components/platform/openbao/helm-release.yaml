# Official OpenBao chart via Flux HelmRelease (no vendored render).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: platform-openbao
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
    # Chart probes fail while sealed; bootstrap.sh unseals after first install
    disableWait: true
  upgrade:
    remediation:
      remediateLastFailure: true
    disableWait: true
  chart:
    spec:
      chart: openbao
      version: "0.28.5"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: openbao
      interval: 24h
  values:
    global:
      tlsDisable: true

    injector:
      enabled: false
    csi:
      enabled: false

    ui:
      enabled: true
      serviceType: ClusterIP

    server:
      image:
        repository: openbao/openbao
        tag: "2.6.0"
        pullPolicy: IfNotPresent

      authDelegator:
        enabled: true

      dataStorage:
        enabled: true
        size: 1Gi
        storageClass: zfs-iscsi
        accessMode: ReadWriteOnce
        mountPath: /openbao/data

      auditStorage:
        enabled: false

      ha:
        enabled: false

      standalone:
        enabled: true
        config: |
          ui = true

          listener "tcp" {
            address         = "[::]:8200"
            cluster_address = "[::]:8201"
            tls_disable     = 1
          }

          storage "file" {
            path = "/openbao/data"
          }

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
