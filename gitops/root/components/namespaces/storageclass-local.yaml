# Static / hostPath volumes (MinIO, mailpit, pact, redis, …).
# Reclaim is set on each PV (Retain). Do not set reclaimPolicy here —
# the field is immutable on an existing StorageClass.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
