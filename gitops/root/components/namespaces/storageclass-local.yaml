# Static / hostPath volumes (MinIO, etc.). Prefer Retain so Day-1 cutovers
# do not wipe worker disks when PVCs are deleted.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
provisioner: kubernetes.io/no-provisioner
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
