apiVersion: v1
kind: PersistentVolume
metadata:
  name: mailpit-pv
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: messaging
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/lib/data/mailpit
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-worker-1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailpit-storage-pv-claim
  namespace: data
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: messaging
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 1Gi
  volumeName: mailpit-pv
