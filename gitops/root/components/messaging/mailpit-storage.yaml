apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mailpit-storage-pv-claim
  namespace: data
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: messaging
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zfs-iscsi
  resources:
    requests:
      storage: 1Gi
