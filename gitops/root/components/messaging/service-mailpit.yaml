# Preserve historical Service name `mailpit` + MetalLB IP (both SMTP + UI).
# Chart exposes mailpit-http / mailpit-smtp; this selector matches the Helm pods.
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: data
  labels:
    app: mailpit
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: messaging
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.177.76.235"
spec:
  type: LoadBalancer
  ports:
    - port: 1025
      targetPort: 1025
      protocol: TCP
      name: smtp
    - port: 8025
      targetPort: 8025
      protocol: TCP
      name: web
  selector:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/instance: mailpit
