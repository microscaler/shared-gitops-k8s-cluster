# jouve/mailpit (axllent image). Env knobs: profile helm-values-mailpit.yaml.
# Combined LB Service `mailpit` is a thin alias (service-mailpit.yaml).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mailpit
  namespace: data
  labels:
    app.kubernetes.io/part-of: shared-gitops-k8s-cluster
    gitops.microscaler.io/stack: messaging
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      remediateLastFailure: true
      retries: 3
  chart:
    spec:
      chart: mailpit
      version: "0.34.1"
      sourceRef:
        kind: HelmRepository
        name: jouve
        namespace: data
      interval: 24h
  valuesFrom:
    - kind: ConfigMap
      name: messaging-helm-values-mailpit
      valuesKey: values.yaml
  values:
    fullnameOverride: mailpit
    nameOverride: mailpit
