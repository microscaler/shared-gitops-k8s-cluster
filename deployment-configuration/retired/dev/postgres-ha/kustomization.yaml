# Secrets: application.secrets.env (SOPS). Helm overlay: helm-values.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data

configMapGenerator:
  - name: postgres-ha-helm-values
    files:
      - values.yaml=helm-values.yaml

secretGenerator:
  - name: postgres-credentials
    envs:
      - application.secrets.env

generatorOptions:
  disableNameSuffixHash: true
  immutable: false
