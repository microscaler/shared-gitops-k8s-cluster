# Dev overlay for Bitnami postgresql-ha (Flux valuesFrom).
# Structural refs (existingSecret, fullnameOverride) stay in the HelmRelease.
global:
  defaultStorageClass: zfs-iscsi
  security:
    allowInsecureImages: true

postgresql:
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql-repmgr
    tag: 17.6.0-debian-12-r2
  replicaCount: 3
  username: postgres
  database: postgres
  repmgrUsername: repmgr
  repmgrDatabase: repmgr
  podAntiAffinityPreset: hard
  # Medium t-shirt: more shared clients (loadlinker + sesame + rerp) after
  # app-pool bumps exhausted the previous small pgpool front-end.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 120
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 30
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
  audit:
    logHostname: false
  repmgrConnectTimeout: 30
  # Backend headroom for pgpool children × maxPool (+ repmgr / admin).
  extendedConf: |
    max_connections = 400

pgpool:
  image:
    registry: docker.io
    repository: bitnamilegacy/pgpool
    tag: 4.6.3-debian-12-r0
  # Dev needs no pgpool HA (postgresql statefulset still runs 3 replicas for
  # DB HA); one pgpool replica halves memory + connection pressure.
  replicaCount: 1
  podAntiAffinityPreset: hard
  adminUsername: admin
  logHostname: false
  srCheckUsername: sr_check_user
  srCheckDatabase: postgres
  # Connection budget vs postgresql max_connections=400 (extendedConf above):
  #   numInitChildren × maxPool × replicaCount = 64 × 4 × 1 = 256  (< 400, ok).
  # Front-end slots ≈ numInitChildren − reservedConnections = 62 concurrent
  # clients — enough for ~25 microservices × 2-slot Lifeguard pools without
  # "sorry, too many clients already".
  numInitChildren: "64"
  maxPool: "4"
  # Lifeguard `with_session_transaction` issues BEGIN + RLS SET before the first
  # write. With load balancing on, pgpool can pin that preamble to a standby and
  # then reopen the write on primary — org INSERT commits, membership INSERT FK
  # fails ("org_id not present"), leaving orphan organizations. Dev: send all
  # traffic to primary; HA still comes from the 3-node postgresql StatefulSet.
  useLoadBalancing: false
  # Belt-and-suspenders if load balancing is re-enabled later.
  disableLoadBalancingOnWrite: always
  reservedConnections: "2"
  childLifeTime: "300"
  childMaxConnections: "0"
  startupProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  # Medium t-shirt: 64 children need more RSS than the previous 32-child pack.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1500m"
      memory: 3500Mi

metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgres-exporter
    tag: 0.17.1-debian-12-r16

volumePermissions:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r51

persistence:
  enabled: true
  storageClass: zfs-iscsi
  size: 10Gi
