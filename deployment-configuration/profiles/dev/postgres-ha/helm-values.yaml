# Dev overlay for Bitnami postgresql-ha (Flux valuesFrom).
# Structural refs (existingSecret, fullnameOverride) stay in the HelmRelease.
global:
  defaultStorageClass: zfs-iscsi
  security:
    allowInsecureImages: true

postgresql:
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql-repmgr
    tag: 17.6.0-debian-12-r2
  replicaCount: 3
  username: postgres
  database: postgres
  repmgrUsername: repmgr
  repmgrDatabase: repmgr
  podAntiAffinityPreset: hard
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  livenessProbe:
    enabled: true
    initialDelaySeconds: 120
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 30
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60
  audit:
    logHostname: false
  repmgrConnectTimeout: 30
  # Dev runs many microservice pools through 2× pgpool; raise backend headroom.
  extendedConf: |
    max_connections = 300

pgpool:
  image:
    registry: docker.io
    repository: bitnamilegacy/pgpool
    tag: 4.6.3-debian-12-r0
  # Dev needs no pgpool HA (postgresql statefulset still runs 3 replicas for
  # DB HA); one pgpool replica halves memory + connection pressure.
  replicaCount: 1
  podAntiAffinityPreset: hard
  adminUsername: admin
  logHostname: false
  srCheckUsername: sr_check_user
  srCheckDatabase: postgres
  # Connection budget vs postgresql max_connections=300 (extendedConf above):
  #   numInitChildren × maxPool × replicaCount = 32 × 4 × 1 = 128  (< 300, ok).
  # 32 children keeps ample front-end headroom for hauliage + sesame-idam + rerp
  # + opengroupware pools; the memory bump below is what actually prevents the
  # pgpool OOM that previously masqueraded as "too many clients" during crashes.
  numInitChildren: "32"
  maxPool: "4"
  reservedConnections: "2"
  childLifeTime: "300"
  childMaxConnections: "0"
  startupProbe:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  # Init was OOM-killed at 384Mi, then again at 768Mi (container init OOM,
  # containerd) — 32 forked children + parent + PCP need real headroom.
  # Raised to 1.5Gi limit / 768Mi request per replica.
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 500m
      memory: 1536Mi

metrics:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgres-exporter
    tag: 0.17.1-debian-12-r16

volumePermissions:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/os-shell
    tag: 12-debian-12-r51

persistence:
  enabled: true
  storageClass: zfs-iscsi
  size: 10Gi
