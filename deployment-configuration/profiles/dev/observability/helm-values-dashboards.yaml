# Dev overlay for OpenSearch Dashboards (Flux valuesFrom).
opensearchHosts: "http://opensearch-nodes:9200"

# Single-cluster dev: disable the data-sources plugin so GitOps-provisioned
# index patterns appear in Dashboards Management without a data source link.
config:
  opensearch_dashboards.yml: |
    data_source.enabled: false
    opensearchDashboards.defaultRoute: /app/data-explorer/discover/#/?_g=(filters:!(),refreshInterval:(pause:!f,value:30000),time:(from:now-15m,to:now))&_a=(discover:(columns:!(resource.attributes.k8s@namespace@name,serviceName,observedTimestamp,severityText,log.attributes.event_class,log.attributes.event_category,log.attributes.has_trace,body),interval:auto,sort:!(!(observedTimestamp,desc))),metadata:(indexPattern:shared-observability-logs,view:discover))&_q=(filters:!(),query:(language:lucene,query:'%28log.attributes.event_class%3Aapplication%29%20OR%20%28NOT%20log.attributes.event_class%3A*%20AND%20NOT%20log.attributes.event_category%3A%20%28%22epoll_io%22%20OR%20%22runtime_metrics%22%29%20AND%20NOT%20body%3A%20%28*epoll%20select*%29%20AND%20NOT%20body%3A%20%22Memory%20statistics%22%29'))

service:
  type: ClusterIP
  port: 5601

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

opensearchAccount:
  secret: ""
extraEnvs:
  - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
    value: "true"
