# Dev overlay for OpenSearch Dashboards (Flux valuesFrom).
opensearchHosts: "http://opensearch-nodes:9200"

# Single-cluster dev: disable the data-sources plugin so GitOps-provisioned
# index patterns appear in Dashboards Management without a data source link.
config:
  opensearch_dashboards.yml: |
    data_source.enabled: false
    opensearchDashboards.defaultRoute: /app/data-explorer/discover/#/?_g=(filters:!(),refreshInterval:(pause:!f,value:30000),time:(from:now-15m,to:now))&_a=(discover:(columns:!(resource.attributes.k8s@namespace@name,serviceName,observedTimestamp,severityText,log.attributes.event_class,log.attributes.event_category,log.attributes.has_trace,body),interval:auto,sort:!(!(observedTimestamp,desc))),metadata:(indexPattern:shared-observability-logs,view:discover))&_q=(filters:!(),query:(language:lucene,query:'%28log.attributes.event_class%3Aapplication%29%20OR%20%28NOT%20log.attributes.event_class%3A*%20AND%20NOT%20log.attributes.event_category%3A%20%28%22epoll_io%22%20OR%20%22runtime_metrics%22%20OR%20%22runtime_config%22%20OR%20%22framework_lifecycle%22%29%20AND%20NOT%20%28body%3A%20%28*epoll%20select*%29%20OR%20body%3A%20%22Memory%20statistics%22%20OR%20body%3A%20%28%22Handler%20registered%20successfully%22%20OR%20%22Replaced%20existing%20handler*%22%20OR%20%22Schema%20validator*%22%20OR%20%22Initializing%20JSON%20Schema*%22%20OR%20%22Precompiled%20schemas*%22%20OR%20%22Routing%20table%20loaded*%22%20OR%20%22Pre-registering%20paths*%22%20OR%20%22set%20stack%20size=*%22%20OR%20%22set%20workers=*%22%29%29%20AND%20NOT%20log.attributes.log@target%3A%20%22may%3A%3Aconfig%22%20AND%20NOT%20instrumentationScope.name%3A%20%28brrtrouter%3A%3Adispatcher%3A%3Acore%20OR%20brrtrouter%3A%3Avalidator_cache%20OR%20brrtrouter%3A%3Arouter%3A%3Acore%20OR%20brrtrouter%3A%3Aserver%3A%3Aservice%29%29'))

service:
  type: ClusterIP
  port: 5601

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

opensearchAccount:
  secret: ""
extraEnvs:
  - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
    value: "true"
