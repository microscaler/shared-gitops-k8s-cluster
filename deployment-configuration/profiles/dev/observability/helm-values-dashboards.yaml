# Dev overlay for OpenSearch Dashboards (Flux valuesFrom).
opensearchHosts: "http://opensearch-nodes:9200"

# Single-cluster dev: disable the data-sources plugin so GitOps-provisioned
# index patterns appear in Dashboards Management without a data source link.
#
# Do NOT set opensearchDashboards.defaultRoute here — OSD 2.19 rejects that key
# (ValidationError: "defaultRoute" is not allowed) and CrashLoops the pod.
# Discover Signal landing is provisioned via saved searches + docs URLs.
config:
  opensearch_dashboards.yml: |
    data_source.enabled: false
    # Required for Vega mark href (doc/around links, volume bar zoom). Without
    # this, canvas clicks sanitize-fail silently and look like dead links.
    vis_type_vega.enableExternalUrls: true

service:
  type: ClusterIP
  port: 5601

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

opensearchAccount:
  secret: ""
extraEnvs:
  - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
    value: "true"
