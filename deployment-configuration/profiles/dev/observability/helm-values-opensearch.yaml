# Dev overlay for OpenSearch chart (Flux valuesFrom).
clusterName: opensearch
nodeGroup: nodes
singleNode: true
replicas: 1

securityConfig:
  enabled: false
extraEnvs:
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"

config:
  opensearch.yml: |
    cluster.name: opensearch
    network.host: 0.0.0.0
    discovery.type: single-node
    plugins.security.disabled: true

opensearchJavaOpts: "-Xmx768M -Xms768M"

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

persistence:
  enabled: true
  enableInitChown: true
  storageClass: zfs-iscsi
  size: 30Gi
  accessModes:
    - ReadWriteOnce

sysctlInit:
  enabled: true

antiAffinity: soft

service:
  type: ClusterIP
  annotations: {}
