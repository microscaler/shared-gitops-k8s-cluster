# Dev overlay for official OpenTelemetry Collector chart (Flux valuesFrom).
# MetalLB annotations stay on the HelmRelease (inventory source of truth).
mode: deployment
fullnameOverride: otel-collector
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.114.0"
  pullPolicy: IfNotPresent

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: false
  prometheus:
    enabled: true
    containerPort: 9464
    servicePort: 9464
    protocol: TCP

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
  processors:
    batch: {}
    memory_limiter:
      check_interval: 1s
      # Stay below the pod's 256 MiB cgroup limit so the limiter acts before OOM.
      limit_mib: 192
      spike_limit_mib: 48
    filter/drop-low-severity:
      error_mode: ignore
      logs:
        log_record:
          - 'IsMatch(severity_text, "^(DEBUG|TRACE)$")'
    # Prometheus staleness markers are OTLP datapoints with
    # DATA_POINT_FLAGS_NO_RECORDED_VALUE (currently bit value 1). Data Prepper
    # cannot index a gauge without a value, so discard the marker, not a real
    # measurement, before export.
    filter/drop-no-recorded-value:
      error_mode: ignore
      metrics:
        datapoint:
          - flags == 1
  exporters:
    otlp/traces:
      endpoint: data-prepper.observability.svc.cluster.local:21890
      tls:
        insecure: true
    otlp/metrics:
      endpoint: data-prepper.observability.svc.cluster.local:21891
      tls:
        insecure: true
    otlp/logs:
      endpoint: data-prepper.observability.svc.cluster.local:21892
      tls:
        insecure: true
    prometheus:
      endpoint: ${env:MY_POD_IP}:9464
      resource_to_telemetry_conversion:
        enabled: true
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/traces]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, filter/drop-no-recorded-value, batch]
        exporters: [otlp/metrics, prometheus]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, filter/drop-low-severity, batch]
        exporters: [otlp/logs]
