# Dev overlay for official OpenTelemetry Collector chart (Flux valuesFrom).
# MetalLB annotations stay on the HelmRelease (inventory source of truth).
mode: deployment
fullnameOverride: otel-collector
replicaCount: 1

# Inject k8s.namespace.name / pod metadata onto OTLP resource attributes so
# Discover can filter namespace → application → time (not the hardcoded
# service.namespace=microscaler from app binaries).
presets:
  kubernetesAttributes:
    enabled: true

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.114.0"
  pullPolicy: IfNotPresent

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
    appProtocol: grpc
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: false
  prometheus:
    enabled: true
    containerPort: 9464
    servicePort: 9464
    protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    # k3s scrapes (node-exporter + kube-state) + OTLP logs need headroom;
    # 1536Mi + limiter 1152Mi still refused scrapes under load (2026-07-22).
    cpu: "1"
    memory: 3072Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
    # Data namespace exporters (Lifeguard Postgres primary+replicas, Redis)
    # → OpenSearch via Data Prepper. Pgpool retired with postgres-ha.
    prometheus/data:
      config:
        scrape_configs:
          - job_name: postgres
            scrape_interval: 15s
            static_configs:
              - targets:
                  - postgres-exporter.data.svc.cluster.local:9187
                labels:
                  service: postgres
                  platform_component: postgres
            metric_relabel_configs:
              - source_labels: [__name__]
                # Primary health + streaming replica lag + connections.
                regex: pg_up|pg_replication_is_replica|pg_replication_lag_seconds|pg_stat_replication_pg_wal_lsn_diff|pg_stat_database_numbackends|pg_settings_max_connections|pg_stat_activity_count|pg_database_size_bytes
                action: keep
              - source_labels: [datname]
                regex: hauliage
                target_label: consumer_namespace
                replacement: loadlinker
              - source_labels: [datname]
                regex: sesame_idam
                target_label: consumer_namespace
                replacement: sesame-idam
              - source_labels: [datname]
                regex: rerp
                target_label: consumer_namespace
                replacement: rerp
              - source_labels: [datname]
                regex: postgres|template0|template1
                target_label: consumer_namespace
                replacement: platform/data
          - job_name: redis
            scrape_interval: 15s
            static_configs:
              - targets:
                  - redis-metrics.data.svc.cluster.local:9121
                labels:
                  service: redis
                  platform_component: redis
                  consumer_namespace: platform/data
            metric_relabel_configs:
              - source_labels: [__name__]
                regex: redis_connected_clients|redis_memory_used_bytes|redis_commands_processed_total|redis_keyspace_hits_total|redis_keyspace_misses_total|redis_evicted_keys_total
                action: keep
    # Dev k3s hosts + object state (node-exporter DaemonSet + kube-state-metrics).
    # Highly specific to the LAN multipass/k3s cluster — not for GCP.
    prometheus/k3s:
      config:
        scrape_configs:
          - job_name: node-exporter
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [observability]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                regex: node-exporter
                action: keep
              # k8s_sd sets __address__ from pod IP + containerPort (9100).
              # Do not use $1 replacements — OTel env-expands them and crashes.
              - source_labels: [__meta_kubernetes_pod_node_name]
                target_label: node
              - target_label: platform_component
                replacement: k3s
              - target_label: service
                replacement: node-exporter
            metric_relabel_configs:
              - source_labels: [__name__]
                regex: node_load1|node_load5|node_load15|node_memory_MemAvailable_bytes|node_memory_MemTotal_bytes|node_filesystem_avail_bytes|node_filesystem_size_bytes|node_uname_info|node_network_receive_bytes_total|node_network_transmit_bytes_total
                action: keep
              # Filesystem metrics without mountpoint=/ are host noise.
              - source_labels: [mountpoint]
                regex: '/.+'
                action: drop
              # Skip loopback / virtual NICs.
              - source_labels: [device]
                regex: 'lo|veth.*|flannel.*|cni.*|cali.*|docker.*|br-.*'
                action: drop
          - job_name: kube-state-metrics
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [observability]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                regex: kube-state-metrics
                action: keep
              # Drop the telemetry port (8081); only scrape metrics :8080.
              - source_labels: [__meta_kubernetes_pod_container_port_number]
                regex: "8080"
                action: keep
              - target_label: platform_component
                replacement: k3s
              - target_label: service
                replacement: kube-state-metrics
            metric_relabel_configs:
              - source_labels: [__name__]
                # Drop kube_pod_info (high-card labels); phase/restarts cover dashboards.
                regex: kube_node_info|kube_node_status_condition|kube_pod_status_phase|kube_pod_container_status_restarts_total|kube_deployment_status_replicas_available|kube_deployment_status_replicas_unavailable|kube_daemonset_status_number_unavailable
                action: keep
  processors:
    batch: {}
    memory_limiter:
      check_interval: 1s
      # Soft refuse before cgroup OOM (pod limit 3072Mi).
      limit_mib: 2304
      spike_limit_mib: 512
    # Drop DEBUG/TRACE except request access lines (BRRTRouter demoted those to
    # debug; sesame RUST_LOG=debug still emits them — keep for Discover detail).
    filter/drop-low-severity:
      error_mode: ignore
      logs:
        log_record:
          - 'IsMatch(severity_text, "^(DEBUG|TRACE)$") and not IsMatch(body, "(?i)^Request (completed|received)$")'
    # K8s probes flood Request received/completed; keep real traffic only.
    filter/drop-health-probes:
      error_mode: ignore
      logs:
        log_record:
          - 'IsMatch(attributes["path"], "^/(health|readyz|livez|healthz)$") and IsMatch(body, "(?i)^Request (completed|received)$")'
    # High-churn runtime I/O / metrics drown application signal. Drop at the
    # collector (source reader) before classify/export. Lifecycle/config noise
    # stays indexed for explicit selection via Logs / Runtime noise.
    filter/drop-epoll-io:
      error_mode: ignore
      logs:
        log_record:
          - 'attributes["log.target"] == "may::io::sys::select"'
          - 'IsMatch(body, "(?i).*epoll select.*")'
          - 'instrumentation_scope.name == "brrtrouter::middleware::memory"'
          - 'IsMatch(body, "(?i)^Memory statistics$")'
    # Prometheus staleness markers are OTLP datapoints with
    # DATA_POINT_FLAGS_NO_RECORDED_VALUE (currently bit value 1). Data Prepper
    # cannot index a gauge without a value, so discard the marker, not a real
    # measurement, before export.
    filter/drop-no-recorded-value:
      error_mode: ignore
      metrics:
        datapoint:
          - flags == 1
    # Tag remaining logs with event_class + event_category. Epoll/memory are
    # dropped upstream; lifecycle/config runtime_noise stays selectable.
    # Prefer k8s namespace over app defaults.
    transform/classify-log-signal:
      error_mode: ignore
      log_statements:
        - context: resource
          statements:
            - set(attributes["service.namespace"], attributes["k8s.namespace.name"]) where attributes["k8s.namespace.name"] != nil
        - context: log
          statements:
            # Fix missing SDK timestamps (Data Prepper otherwise indexes time=1970).
            - set(time_unix_nano, observed_time_unix_nano) where time_unix_nano == 0
            # --- Runtime noise (epoll/memory already dropped by filter/drop-epoll-io) ---
            # may runtime knobs (workers / stack size)
            - set(attributes["event_category"], "runtime_config") where attributes["log.target"] == "may::config"
            - set(attributes["event_category"], "runtime_config") where attributes["event_category"] == nil and IsMatch(body, "(?i)^set (workers|stack size)=")
            # BRRTRouter bootstrap / hot-reload lifecycle (not request-path signal).
            # Do NOT match brrtrouter::server::service by scope — that module also
            # emits Request completed access logs that must stay application signal.
            - set(attributes["event_category"], "framework_lifecycle") where attributes["event_category"] == nil and IsMatch(instrumentation_scope.name, "(?i)^brrtrouter::(dispatcher::core|validator_cache|router::core)$")
            - set(attributes["event_category"], "framework_lifecycle") where attributes["event_category"] == nil and IsMatch(body, "(?i)^(Handler registered successfully|Replaced existing handler|Schema validator|Initializing JSON Schema|Precompiled schemas|Routing table loaded|Pre-registering paths)")
            - set(attributes["event_class"], "runtime_noise") where attributes["event_category"] == "runtime_config" or attributes["event_category"] == "framework_lifecycle"
            # --- Application signal categories ---
            - set(attributes["event_category"], "http") where attributes["event_category"] == nil and IsMatch(body, "(?i)^Request (completed|received)$")
            - set(attributes["event_category"], "auth") where attributes["event_category"] == nil and IsMatch(instrumentation_scope.name, "(?i).*(jwks|login|session|authz|api.keys|org.mgmt|user.mgmt).*")
            - set(attributes["event_category"], "application") where attributes["event_category"] == nil
            - set(attributes["event_class"], "application") where attributes["event_class"] == nil
            # --- Correlation helper for Discover sidebar ---
            - set(attributes["has_trace"], false)
            - set(attributes["has_trace"], true) where trace_id != nil
            # Promote body to message for clearer Discover detail labeling
            - set(attributes["message"], body) where attributes["message"] == nil
  exporters:
    otlp/traces:
      endpoint: data-prepper.observability.svc.cluster.local:21890
      tls:
        insecure: true
    otlp/metrics:
      endpoint: data-prepper.observability.svc.cluster.local:21891
      tls:
        insecure: true
    otlp/logs:
      endpoint: data-prepper.observability.svc.cluster.local:21892
      tls:
        insecure: true
    prometheus:
      endpoint: ${env:MY_POD_IP}:9464
      resource_to_telemetry_conversion:
        enabled: true
  extensions:
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/traces]
      metrics:
        receivers: [otlp, prometheus/data, prometheus/k3s]
        processors: [memory_limiter, filter/drop-no-recorded-value, batch]
        exporters: [otlp/metrics, prometheus]
      logs:
        receivers: [otlp]
        # k8sattributes is injected by presets.kubernetesAttributes before this list
        # is merged; transform overwrites service.namespace from k8s.namespace.name.
        # Drop epoll/memory/probes before classify so volume never reaches OpenSearch.
        processors: [memory_limiter, filter/drop-epoll-io, filter/drop-health-probes, transform/classify-log-signal, filter/drop-low-severity, batch]
        exporters: [otlp/logs]
