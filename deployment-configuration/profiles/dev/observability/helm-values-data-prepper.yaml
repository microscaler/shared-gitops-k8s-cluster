# Dev overlay for Data Prepper (Flux valuesFrom).
fullnameOverride: data-prepper
replicaCount: 1

# 2.11 updates the OpenTelemetry protobuf decoder used by the metrics source.
image:
  repository: opensearchproject/data-prepper
  tag: "2.11.0"
  pullPolicy: IfNotPresent

config:
  data-prepper-config.yaml: |
    ssl: false
  log4j2-rolling.properties: |
    status = error
    name = PropertiesConfig
    appender.console.type = Console
    appender.console.name = STDOUT
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{ISO8601} [%t] %-5p %40C - %m%n
    rootLogger.level = info
    rootLogger.appenderRef.stdout.ref = STDOUT

pipelineConfig:
  enabled: true
  demoPipeline: "false"
  config:
    otel-trace-pipeline:
      workers: 2
      delay: 100
      source:
        otel_trace_source:
          ssl: false
          port: 21890
      sink:
        - opensearch:
            hosts: ["http://opensearch-nodes:9200"]
            insecure: true
            index_type: trace-analytics-raw
    otel-metrics-pipeline:
      workers: 2
      delay: 100
      source:
        otel_metrics_source:
          ssl: false
          port: 21891
      sink:
        - opensearch:
            hosts: ["http://opensearch-nodes:9200"]
            insecure: true
            index: otel-v1-apm-metrics-%{yyyy.MM.dd}
    otel-logs-pipeline:
      workers: 2
      delay: 100
      source:
        otel_logs_source:
          ssl: false
          port: 21892
      sink:
        - opensearch:
            hosts: ["http://opensearch-nodes:9200"]
            insecure: true
            index: otel-v1-apm-logs-%{yyyy.MM.dd}

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    # Was pegged at 500m CPU → OTel export DeadlineExceeded / empty dashboards.
    cpu: "2"
    memory: 1536Mi
