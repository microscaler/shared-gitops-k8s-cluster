# Non-secret postgres-backup CronJob config (dev).
# Password / MinIO keys come from postgres-credentials + minio-credentials Secrets.
POSTGRES_HOST=postgres-ha-postgresql-0.postgres-ha-postgresql-headless.data.svc.cluster.local
POSTGRES_PORT=5432
POSTGRES_USER=postgres
MINIO_ENDPOINT=minio.data.svc.cluster.local:9000
MINIO_BUCKET=postgres-backups
RETENTION_DAYS=7
# Comma-separated product databases which must be present in every successful
# whole-cluster dump. The backup Job fails before upload if any are absent.
REQUIRED_DATABASES=rerp
