# Dev overlay for official Fluvio fluvio-app chart (Flux valuesFrom).
# Source: infinyon/fluvio @ v0.18.1 k8-util/helm/fluvio-app
image:
  registry: infinyon
  tag: "0.18.1"
  pullPolicy: IfNotPresent

scLog: info
tls: false

service:
  type: LoadBalancer

scPod:
  publicPort: 9003
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

spuPod:
  storageClass: zfs-iscsi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m

rbac:
  create: true
serviceAccount:
  name: fluvio
