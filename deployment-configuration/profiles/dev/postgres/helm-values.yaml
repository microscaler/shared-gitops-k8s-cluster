# Dev overlay for lifeguard/charts/postgres (Flux valuesFrom).
# Secrets: application.secrets.env → postgres-credentials (existingSecret).

auth:
  existingSecret: postgres-credentials
  passwordKey: postgres-password
  replicationPasswordKey: postgres-replication-password

primary:
  name: postgres-primary
  persistence:
    storageClass: zfs-iscsi
    # Must be >= existing Bound PVC capacity (shrink is forbidden).
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

service:
  name: postgres
  type: LoadBalancer
  port: 5432
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.177.76.224"

replica:
  enabled: true
  count: 2
  persistence:
    storageClass: zfs-iscsi
    size: 10Gi

exporter:
  enabled: true
