# Dev overlay for MinIO chart (Flux valuesFrom).
# MetalLB annotations + existingSecret stay in the HelmRelease.
mode: standalone
replicas: 1
image:
  repository: quay.io/minio/minio
  tag: RELEASE.2025-09-07T16-13-09Z
mountPath: /data
bucketRoot: /data
persistence:
  enabled: true
  existingClaim: minio-storage
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 500m
users: []
policies: []
ignoreChartChecksums: true
