# Dev overlay for official LiteLLM chart (Flux valuesFrom).
# Bitnami Postgres/Redis subcharts disabled — proxy-only like the prior raw Deployment.
fullnameOverride: routellm
nameOverride: routellm
replicaCount: 1

image:
  repository: ghcr.io/berriai/litellm
  tag: "main-stable"
  pullPolicy: IfNotPresent

db:
  deployStandalone: false
  useExisting: false

redis:
  enabled: false

migrationJob:
  enabled: false
  disableSchemaUpdate: true

# Chart auto-generates PROXY_MASTER_KEY Secret when unset.
environmentConfigMaps:
  - routellm-env

proxy_config:
  model_list:
    - model_name: Qwen/Qwen3.6-35B-A3B-FP8
      litellm_params:
        model: hosted_vllm/Qwen/Qwen3.6-35B-A3B-FP8
        api_base: os.environ/VLLM_API_BASE
        api_key: dummy
    - model_name: gpt-4o-mini
      litellm_params:
        model: hosted_vllm/gpt-4o-mini
        api_base: os.environ/VLLM_API_BASE
        api_key: dummy
    - model_name: qwen3
      litellm_params:
        model: hosted_vllm/qwen3
        api_base: os.environ/VLLM_API_BASE
        api_key: dummy
  litellm_settings:
    drop_params: true
  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1536Mi
# LiteLLM needs longer than chart defaults to bind before probes.
startupProbe:
  path: /health/readiness
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 60
