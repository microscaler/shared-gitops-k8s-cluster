# Profile: secrets + non-secret config for pact (namespace data).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data

configMapGenerator:
  - name: pact-config
    envs:
      - application.properties

secretGenerator:
  - name: pact-credentials
    envs:
      - application.secrets.env

generatorOptions:
  disableNameSuffixHash: true
  immutable: false
