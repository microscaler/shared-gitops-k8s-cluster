# Non-secret pact config (dev). Secrets: application.secrets.env
PACT_POSTGRES_DB=pact
PACT_POSTGRES_USER=pact
PACT_POSTGRES_PGDATA=/var/lib/postgresql/data/pgdata
PACT_BROKER_DATABASE_ADAPTER=postgres
PACT_BROKER_DATABASE_HOST=pact-postgres
PACT_BROKER_DATABASE_PORT=5432
PACT_BROKER_DATABASE_USERNAME=pact
PACT_BROKER_DATABASE_NAME=pact
PACT_BROKER_DATABASE_SSLMODE=disable
PACT_BROKER_ALLOW_PUBLIC_READ=true
PACT_BROKER_LOG_LEVEL=INFO
PACT_BROKER_PUBLIC_HEARTBEAT=true
PACT_BROKER_WEBHOOK_HTTP_VERIFY=false
