# Dev Redis Helm overlay (no secrets — auth disabled on shared platform).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data

configMapGenerator:
  - name: redis-helm-values
    files:
      - values.yaml=helm-values.yaml

generatorOptions:
  disableNameSuffixHash: true
  immutable: false
